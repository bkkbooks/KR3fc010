body:
  text: 訪通人皆未之見歲庚午應順天試留京師在李雲門侍郎寓邸見雜鈔算書約百餘番乃阮藝臺中丞提調文穎館時從永樂大典中托録者中有楊輝摘奇數條始得略覩梗概究未見全書也今年夏復翁夫子於同郡故家得此書皆散葉且顚倒錯亂殊甚暇日招余至百宋一廛相與驗其文義排比整齊得書六卷首尾序目無缺失亟命工裝成一巨册櫝而藏之由是識與不識成知為希世寶矣田畝比類重修議古截田諸問皆天元如積之術其開方步法從橫布祘之式與秦道古數書正同通變卷內有代乘代除各三百題此即今人所謂飛歸法考夏侯陽算經巳有以幾添之身外減幾之語蓋超徑算接之術濫觴於唐以前矣書中所稱九章海島孫子五曹張𠀉建等今皆刊本通行其應用算法詳解算法指南算法九章纂類議古根源辨古通源各書則未知尚有流傳不也楊輝字謙光錢塘人序作於德祐乙亥瀛國公元年也法算取用本末有史仲榮名未審何人當考嘉慶甲戌重陽日元和李鋭跋
