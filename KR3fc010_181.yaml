  text: 兩次損二猶兩次七因也置匹數一上定百尺從尾位次第損三得四千三百四十又損三同五十一三因加七五十二四因加三五十三折半隔位加六五十四六因九因五十五加一折半五十六四因加四五十七三因加九五十八加一六折半五十九加一八折半綢五十七匹每匹五丈一尺問積幾尺答曰二千九百七尺五十一為法置匹數三因又加七合問五十七為法置尺數三因又加九合問六十一加二二折半六十二加二四折半六十三損一損三六十四兩次損二六十五加三折半六十六六因加一六十七加三四折半六十八四因加七六十九加三八折半物六十一斤斤價六百三十問共幾錢答曰三十八貫四百三十文六十一為法置斤價加二二折半合問六十三為法置斤數先損一卻損三合問七十一加四二折半七十二六因加二七十三加四六折半七十四加乙一減五七十五加五折半七十六四因加九七十七七因加一七十八六因加三七十九加五
