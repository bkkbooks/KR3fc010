body:
  text: 圓用周三徑一之法合徑一十步周三十步徑十六步借圓田周徑相乘四而一為術若徑步與周勢遠甚者不可專此術草曰周三十步乘徑十六步得四百八十步以四除之得一百二十步五曹算經丘田外周六百四十步徑三百八十步問田幾何答曰二頃五十三畝八十步丘田比附畹田用周徑相乘四而一之法田圍凸外者可用或圍步凹裏者未免圍多積少不合法理須當分段求之可也草曰周徑相乘得二十四萬三千二百步以四除之得六萬八百步畝法除之五曹有牛角田用角口乘角面折半即勾股田勢非牛角也台州董田圖有牛角田用弧矢四法此説方是今有牛角田一段角長一十六步口闊六步問田答曰一百一十四步
  hash: sha256:f2ded575de9f812e648d2efb21dcaf4d3d3ab8a04f75b62b22878ec9c6f2d55f
