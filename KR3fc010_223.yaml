body:
  text: 宋楊輝集率分身雉兔同籠上有三十五頭卽是三十五集下𠔏九十四足問各幾何荅曰雉二十三兔兔一十二分身術曰倍頭減足倍四不分雉兔是以二足乘隻數於眾足內減所餘者卽一兔剩二足也折半爲兔先求雉術曰四因雙數兔有四足以𠔏足九十四足減之餘皆雉足四十六折半爲雉羅七尺綾九尺其價適等只云綾尺價少羅尺價三十六文問各尺價幾何應用荅曰羅一百六十二綾一百二十六𠔏積分身術曰先求羅價以少價三十六文乘綾數得三百二十四羅綾尺數相減餘二尺爲法除之爲羅價以減少價三十六爲綾先求綾價術曰以少價三十六文乘羅數七尺以羅綾尺數相減餘二尺爲法除之爲綾價加少價三十六文爲羅右二問雙率分身也以後三問乃三率分身雞翁一直五文雞母一直三文雞雛一直一文凡一百文買雞百隻問翁母雛各幾何
