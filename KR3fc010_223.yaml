body:
  text: 宋楊輝集率分身雉兔同籠上有三十五頭即是三十五集下𠔏九十四足問各幾何答曰雉二十三兔兔一十二分身術曰倍頭減足倍四不分雉兔是以二足乘隻數於衆足內減所餘者即一兔剩二足也折半為兔先求雉術曰四因雙數兔有四足以𠔏足九十四足減之餘皆雉足四十六折半為雉羅七尺綾九尺其價適等只云綾尺價少羅尺價三十六文問各尺價幾何應用答曰羅一百六十二綾一百二十六𠔏積分身術曰先求羅價以少價三十六文乘綾數得三百二十四羅綾尺數相減餘二尺為法除之為羅價以減少價三十六為綾先求綾價術曰以少價三十六文乘羅數七尺以羅綾尺數相減餘二尺為法除之為綾價加少價三十六文為羅右二問雙率分身也以後三問乃三率分身雞翁一直五文雞母一直三文雞雛一直一文凡一百文買雞百隻問翁母雛各幾何
