  text: 誤九百六六加六六闕加六六物二百六十一斤次加身百闕次百七一百七五七因又兩次五因闕因又兩次五因田長一百八十四步從尾退七七闕尾二百一至三百二百五五誤三二二乙誤二乙乙連身加二三誤一三加八八三次折闕八倍之加二三二誤一二五五身前五因折半身誤連二六六加四加九闕九二八二二因加四一四誤因闕一二八五五誤三二八六倍之加四三四誤一闕三二八九兩次加七闕七二九九加三退七七三誤二一至九總用歸法加五九歸五誤二羅三百四十五丈每匹長五丈丈並誤文足稱二百三十二斤身內減六合問脫合田積六萬六千二百四十步用六因九歸闕因九安知下闕二字三十一三十三三誤二五十一三歸減七三誤二六十一加五減乙九歸闕歸六十九二因減三八闕八八十一加五減二九五誤三九十一九十三六歸減五五闕五
