body:
  text: 九十七為法置長步乙上定百位後隔位退三又曰加九四折半合問九十九為法置闊步乙上定百先加一卻損乙又曰隔位退乙合問一百一至一百九隔位加零一百一隔位加一一百二六因加七一百三隔位加三一百四八因加三一百五七因加五一百六隔位加六一百七隔位加七一百八六因加八一百九隔位加九米一百七石每石增耗三升問𠔏幾何答曰一百一十石二斗一升一石加耗三升以一百三為法置一百七石隔位加三合問一百七石為法置一石三升升上定石從尾隔位加七合問一百十一至百九十九竝加兩位百十一加乙一百十二八因加四百十三加乙三百十四六因加九百十五加一五百十六加一六百十七九因加三百十八加乙八百十九七因加七物一百一十三斤每斤一百十九文問𠔏若干答曰一十三貫四百四十七文百十三為法置斤價文上定百身外加三百十九為法置斤數七因斤上定十又加七
