body:
  text: 五毫便以七斤三分七釐五毫乘價尢捷第三題七匹下一十二尺即是匹下二分半便可以七匹二分半乘價錢尢便直田步下帶寸者術曰廣縱步各通為寸入零寸相乘而畝法六十萬寸除之其不及畝餘寸以二千五百寸除為步或更有不及步餘寸以一百約之為尺今有直田廣二十四步三尺四寸縱三十六步二尺八寸問田幾何答曰三畝一百八十二步七尺五寸二分草曰置廣縱步數各以五尺通之併零尺寸其廣得一千二百三十四寸縱得一千八百二十八寸相乘得二百二十五萬五千七百五十二寸以畝法六十萬寸除之先得三畝餘以二千五百寸除得一百八十二步尚餘七百五十二寸以百約之得七尺五寸二分合問又草不通尺寸便以廣下三尺四寸作步下六分八釐以縱下二尺八寸為五分六釐帶於全步之下廣縱相乘得九百二步三分八絲以畝法二百四十除得三畝餘一百八十二步零三分八絲以二十五乘零分絲為七尺五寸二分合問比類分二問銀九斤六兩六銖每兩三貫四百文問𠔏幾何
