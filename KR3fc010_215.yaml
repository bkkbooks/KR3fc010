body:
  text: 百九四減九四百九五倍位三歸減三百九六兩次減四百九七減九七百九八折半九歸減一百九九減九九羅四百九十一丈五尺二寸各支一丈九尺二寸問給幾人荅曰二百五十六人一丈九尺二寸爲法本用減二減六若謂減二繁則用折半六歸代六歸繁則以加五用九歸代或謂減六繁用折半八歸代又謂八歸繁更以加二五代之或三折半代加二五此祗從人便用旣論小法當盡其理又總術曰從上還位折半見一隔位還八置四百九十一丈五尺二寸先折四百丈得二百隔位加還二八十六丈又折百丈得五十加還四丈𠔏餘十乙丈五尺二寸又折十丈得五加還五八四尺尙餘十九尺二寸適撞一人之數𠔏得二百五十六人合問二百一至三百隨題用法二百一減三四減五二百二折半隔位減一二百三減四五減五八二百四減二減七二百五六因減二三二百六折半隔位減三二百七四因減二七歸隔位還一見六十九成百二百八減三減六二百九減一減九二乙一九因減九隔二位還一見一八
