body:
  text: 八十九二因減七八錢三百四貫八十買物每斤八百四十問幾斤荅曰三百六十二斤八十四若依求一倍位減六八則繁今於總錢上加五祗減二六頗易九十一七歸減三九十二加五減三八九十三六歸減五五九十四加五卻減四一九十五二因減九九十六六歸減六九十七二因卻減九四九十八減四七歸九十九減一九歸直田積九千二百一十五步元長九十七步問闊多少荅曰九十五步九十七爲法依求一倍積步減九四合問又曰從上位隔位見一加三遇九七成百一百至一百九總法隔位減零一百一隔位減一一百二六歸減七一百三隔位減三一百四八歸減三一百五七歸減五一百六隔位減六一百七隔位減七一百八六歸減八一百九隔位減九每貫收息三十今本利二萬七千八百一十貫問元本錢荅曰二萬七千貫文先有隔位加故立隔位減置總錢從上減三言如隔位言十次身減之
