body:
  text: 二百三十八畝每畝二百四十步闕上二百倍畝數得四百七十六倍誤位闕得四七誤六六誤七二百三十八畝每畝收粟又草曰置畝收粟數脫收粟求一除曰曰誤四折上闕三字下闕三字用減以代除闕以代除支錢一貫倍實為二十六貫五百四十四六誤二闕貫出錢一千三百五十貫三歸為四百五十兩三錢脫三每畝收粟二石七斗九歸粟數闕九九歸詳說自合伸下仍用商除下輝嘗原下竝闕三字必上闕一字下闕一字九歸新括以古句今注兩存之今誤人歸數求成十遇五成十五誤成足斛米二百二十九石八升起八十三作一百入前位闕起作一百乃得二伯柒拾陸石闕伯柒拾石案此條及下條算式皆從左向右退讀田積二千九百六十七步見二下六十二闕十二遇六十九作一百闕作一百見五下二百十七二誤一闕七算無定數詳說且問二十三四下闕二字銀二百三十七鋌云二退一五四闕一諸括不可入題者隔位損之闕隔以三命三以三誤以二
