body:
  text: 荅曰五百一十貫八百五十文草曰以十六兩通九斤併六兩又二十四銖通兩併入六銖爲三千六百六銖借兩價三貫四百文爲乘用銖法二十四除之得荅數一草不通銖以六銖作兩下二分五釐便用兩價三貫四百乘一百五十兩二分五釐亦合問絹九疋九尺六寸疋法四丈八尺每疋三貫三百六十文問錢幾何荅曰三十貫九百一十二文草曰以疋法四十八通尺寸以疋價乘之復以疋法四十八除之還元乃合所荅一草不通尺寸便以九尺六寸爲疋下二分以疋價乘九疋二分卽得荅數其算尢捷題煩難見法理今譔小題驗法理義旣通雖用煩題瞭然可見也田方二里問幾何荅曰一千五百畝草曰二里乘二里得四里凡一里田積九萬步卽是三百七十五畝不必計步便以三百
  hash: sha256:5dfd7f06f8d076730a1af1ca3ca27274440d10d352c4cfbbab0821cda356695a
