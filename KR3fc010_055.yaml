body:
  text: 答曰五百一十貫八百五十文草曰以十六兩通九斤併六兩又二十四銖通兩併入六銖為三千六百六銖借兩價三貫四百文為乘用銖法二十四除之得答數一草不通銖以六銖作兩下二分五釐便用兩價三貫四百乘一百五十兩二分五釐亦合問絹九匹九尺六寸匹法四丈八尺每匹三貫三百六十文問錢幾何答曰三十貫九百一十二文草曰以匹法四十八通尺寸以匹價乘之復以匹法四十八除之還元乃合所答一草不通尺寸便以九尺六寸為匹下二分以匹價乘九匹二分即得答數其算尢捷題煩難見法理今撰小題驗法理義既通雖用煩題瞭然可見也田方二里問幾何答曰一千五百畝草曰二里乘二里得四里凡一里田積九萬步即是三百七十五畝不必計步便以三百
