body:
  text: 木炭七千五十六斤各支百四十七斤問人數答曰四十八人百四七為法置炭數先用三歸再用兩次七歸求之合問百五一減五一百五二八歸減九百五三九歸減七百五四減一減四百五五減五五百五六減二減三百五七減五七百五八減五八百五九減五隔位減六開渠積六千八百三十七尺𠔏用一百五十九工問一工取土多少答曰四十三尺百五九為法置積尺於百上定尺減五得四千五百五十八尺又隔位減六合問百六一減六一百六二折半兩次九歸百六三減六三百六四減六四百六五減一減五百六六減六六百六七減六七百六八減二減四百六九兩次減三管銀三千七百九十兩八錢每斤內多稱二錢入庫問本收正銀多少答曰二百三十四斤一斤上增二錢以十六兩二錢為法置銀數於十兩上定斤折半兩次用九歸求之合問
