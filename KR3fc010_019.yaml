body:
  text: 加一們術曰以所有物數為實闕位術曰以所以所求物價一後零數闕一後零數足錢九十六貫二百五十文問伸作七十七陌幾何闕六貫二百五十文問伸作草曰足錢為身身下加三闕為身身下誤自乃三誤曰出錢二百七十四貫得四十三斤闕十三誤二加二位闕二官收稅錢置總錢三百四十二貫闕三百四十二貫次加一加畢折半闕加畢折半先加二二如四次加一二如二闕先加二二次加一二如二香加術闕重定位並下當有闕文稅錢二百四十七貫法身下有二位法誤闕身下有草曰置稅錢為身闕曰置稅錢又草置一文九分五釐又誤已闕草置一文稑地一百七十畝價一十貫六百文闕畝價一十貫六百文定十貫闕十貫云一六加如六如誤空闕空云六七加四十二云誤六云一七加如七闕一七加上闕二字法曰如加二位之法闕二位銅二十九匜身二闕二二誤二續入身九成四箇五置於元九位上成四誤盛位上誤為十空二身誤二空二身命二三加如六闕六又置二十三斤為身闕
