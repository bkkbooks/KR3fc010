body:
  text: 周徑相乘四而一圖周十八步乘徑六步得一百八步以四除之得二十七步徑自乘三之四而一圖草曰徑六步自乘得三十六步三因得一百八步以四除得二十七步半周自乘三而一圖草曰半周九步自乘得八十一步以三除之得二十七步合問半周半徑相乘圖半徑自乘三之密率周自乘得三百二十四又七乘之得二千二百六十八以八十八除之得二十五步二十二分步之十七徽術周自乘又二十五乘得八千一百以三百一十四除之得二十五步一百五十七分步之一百二十五圓箭六而裹一不可用圓田術當用梯田法畹田下周三十步徑十六步問田幾何出九章答曰一百二十步
  hash: sha256:ef53be71b769b8493800eee807fa7c4bbf5e8c385728d7509f1752c0c42a2b59
