body:
  text: 溫習加一位加二位加隔位三日學減法起例并定位功課一日加法乃生數也減法乃去其數也有加則有減凡學減必以加法題答考之庶知其源用五日溫習足矣學九歸若記四十四句念法非五七日不熟今但於詳解算法九歸題術中細看注文便知用意之隙而念法用法一日可記矣溫習九歸題目一日求一本是加減乃以倍折兼用故名求一其實無甚深奧卻要知識用度卷後具有題術下法溫習只須一日穿除又名飛歸不過就本位商數除數而已詳解有文一見而曉加減至穿除皆小法也商除後不盡之數法為分母實是分子若乘而還原必用通分分母分子煩者必用約分諸分母子不齊而欲併者必用合分分母子有二較其多寡者必用課分均不齊之分者則用平分斤連銖兩匹帶尺寸亦猶分子非乘分除分不能治之治分乃用算之喉襟也如不學則不足以知算而諸分並著九章方田若以日習一法不旬日而周知更以兩月溫習必能開釋張丘建算序云不患乘除為難而患分母子之為難以輝言之分子本不為難不過位煩創析諸分不致差錯而已矣開方乃算法中大節目勾股旁要演段鎖積多用例有七
