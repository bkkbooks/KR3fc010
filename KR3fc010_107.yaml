body:
  text: 又於上商長六步命負隅減從十八除從三十命上商六步除實盡得長三十六步合問直田積八百六十四步只云一長二闊三和四較𠔏三百一十二問闊幾步荅曰二十四步術曰八因積步爲實一爲負隅𠔏步爲從方開平方除之演段曰三和內有三長三闊併入一長二闊又以四較併四闊爲四長得八長一闊所以用八因積步以應八長用一闊爲負隅也草曰八因積步得六千九百一十二置一爲負隅置三百一十二爲從方上商置二十以乘負隅減從二十餘從二百九十二命上商闊二十除實餘一千七十二復以上商命負隅又減從二十餘從二百七十二退一位負隅二退上續商闊四步命負隅減從四步餘從一百六十八命上商四除實盡闊二十四步直田積八百六十四步只云一長二闊三和四較𠔏三百一十二步問長幾步
