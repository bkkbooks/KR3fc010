body:
  text: 宋楊輝集直田法曰廣縱步數相乘為積步以二百四十除之為畝其不及畝之餘步或以二十四除之為分為釐或以六十除之為角或便云幾畝零幾步今有直田廣三十六步縱四十八步問為田幾何答曰七畝二分草曰廣三十六步乘縱四十八步得一千七百二十八步以二百四十除得七畝二分直田長闊相乘與萬象同中山劉先生益議古根源序曰入則諸門出則直田蓋直田能致諸用而有是說諸家算經皆以直田為第一問亦默會也後以三題比類直田銅三十六匜每匜重四十八斤問𠔏若干答曰一千七百二十八斤草曰以三十六匜乘四十八斤於匜上定斤得一千七百二十八斤合問紗四十八匹每匹用絲三兩六錢問𠔏用若干答曰一百七十二兩八錢草曰以四十八匹乘三兩六錢於匹上定錢乘得一百七十二兩八錢合
