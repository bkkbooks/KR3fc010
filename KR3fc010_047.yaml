body:
  text: 宋楊輝集直田法曰廣縱步數相乘爲積步以二百四十除之爲畝其不及畝之餘步或以二十四除之爲分爲釐或以六十除之爲角或便云幾畝零幾步今有直田廣三十六步縱四十八步問爲田幾何荅曰七畝二分草曰廣三十六步乘縱四十八步得一千七百二十八步以二百四十除得七畝二分直田長闊相乘與萬象同中山劉先生益議古根源序曰入則諸門出則直田蓋直田能致諸用而有是説諸家算經皆以直田爲第一問亦默會也後以三題比類直田銅三十六鉈每鉈重四十八斤問𠔏若干荅曰一千七百二十八斤草曰以三十六鉈乘四十八斤於鉈上定斤得一千七百二十八斤合問紗四十八疋每疋用絲三兩六錢問𠔏用若干荅曰一百七十二兩八錢草曰以四十八疋乘三兩六錢於疋上定錢乘得一百七十二兩八錢合
  hash: sha256:b006f89a533ce3c523f8ee56b055f0610354b0cad637eb4f3b4334d2187b0c0b
