body:
  text: 四除外圍不可施於直恐例將直田外圍四而取一為方面乘積豈不利害往往曾見有人誤用此術所以言之假如有田東西八步南北六步本積四十八步若以外圍量之乃是二十八步用四除為七步自乘卻是四十九步不可用外圍兩折半之法五曹四不等田東三十五步西四十五步南二十五步北一十五步問田幾何答稱三畝八十步非實三畝四十步三尺九分六釐八毫七絲半田圍四面不等者必有斜步然斜步豈可作正步相併今以一寸代十步為圖以證四不等田不可用東西相併南北相併各折半相乘之法
  hash: sha256:d4428395146eca5e9189516c885cf5d83cf155ee2a731a611aa8ca8d6390e17b
