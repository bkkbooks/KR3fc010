body:
  text: 六乘八除七十五乘之七乘八除七因加二五八乘八除不乘除九乘八除九因加二五互換遇九者無折變從本法合分入互換婦人河上蕩杯津吏問曰杯何多婦答曰家有客主二人𠔏飯二分之一三人𠔏羹三分之一四人𠔏肉四分之一總用杯六十五隻不知幾客問總人答曰六十人孫子術曰置六十五杯以十二乘之以十三除之此術未詳當先用合分而後用互換具見細草草曰列分母於右行列分子於左行右二人三人四人左一杯一杯一杯母互乘子得之為法二人三人乘左下一得六二人四人乘左中一得八三人四人乘左上一得十二𠔏二十六杯折半得十三母相乘為實二人三人四人相乘得二十四人折半得十二入前術以十二乘六十五杯用十三除之兵士三千四百七十四人每三人支汗衫絹七十尺每四人支袴絹五十尺問𠔏支幾何應用
