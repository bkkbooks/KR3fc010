body:
  text: 楊輝算法凡六卷四畝比類乘除捷法分上下二卷算法通變本末乘除通變算寶法算取用本末合爲上中下三卷續古摘奇算法別爲一卷舊無總名儀徵阮相國元和李茂才俱目爲楊輝算法今亦仍之輝於算術雖未可謂精㴱而巿肆問超徑等接之術幾于採摭略盡且其中開方演段之法又足與秦道古書相發明故續刊于其所箸詳解九章之後特寫本多殘闕脫譌屬江陰宋君勉之爲之校覈可補者補之譌者改之幷作札記雖非有所匡正以誌校訂之不苟云爾聞朝鮮國尙有傳本見重刊算學啓䝉序序係順治十七年朝鮮通奉大夫守全南道觀察使兼兵馬水軍節度使巡察使全州府尹金始振譔海內君子儻能訪求校正使闕者復完則余且不憚重爲鳩工也道光二十二年壬寅孟夏旣朢上海郁松年識
  hash: sha256:75412850ee17efeab12596d423c1aa3a6dc68451ce6d96a56d4a5d332cb912d6
