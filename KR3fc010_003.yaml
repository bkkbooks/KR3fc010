body:
  text: 楊輝算法凡六卷四畝比類乘除捷法分上下二卷算法通變本末乘除通變算寶法算取用本末合為上中下三卷續古摘奇算法別為一卷舊無總名儀徵阮相國元和李茂才俱目為楊輝算法今亦仍之輝於算術雖未可謂精深而巿肆問超徑等接之術幾于採托略盡且其中開方演段之法又足與秦道古書相發明故續刊于其所箸詳解九章之後特寫本多殘闕脫訛屬江陰宋君勉之為之校核可補者補之訛者改之並作札記雖非有所匡正以志校訂之不苟云爾聞朝鮮國尚有傳本見重刊算學啓蒙序序係順治十七年朝鮮通奉大夫守全南道觀察使兼兵馬水軍節度使巡察使全州府尹金始振撰海內君子儻能訪求校正使闕者復完則余且不憚重為鳩工也道光二十二年壬寅孟夏既望上海郁松年識
  hash: sha256:fa553e86f50783aa7b6dae78c80adbbbc74c4bd79a2e9c8d1608e4989b7b2b78
