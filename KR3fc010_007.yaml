body:
  text: 江陰宋景昌勉之氏撰原寫本每葉二十六行至三十二行不等行二十六字田畝比類乘除捷法卷上今有直田廣三十六步脫六後以三題比類直田題誤田直田步下帶尺者乘得三千二百一貫六百文一誤二直田步下帶寸者縱三十六步二尺八寸二誤三八誤六相乘得二百二十五萬五千七百五十二寸二百誤一百以畝法六十萬寸除之除誤餘便以廣下三尺四寸三誤二以縱下二尺八寸脫下比類下闕二字以六銖作兩下二分五釐闕作田方二里假如田方闕假如便當以三分因二畝闕三二誤三比類闕比法上添八以乘外圍上並闕二字外圍下闕二字以八除之下闕一字圓田六法闕圓田六十二而一闕十二周徑相乘四而一闕相乘並周三徑一闕三七因之如八十八而一闕七闕下八以七乘周闕七問積幾步闕幾答曰二十七步闕七周自乘十二而一圖殘闕上全闕一行意可明者不補圖闕後同周徑相乘四而一圖闕周徑相乘徑自乘三之四而一圖闕徑自得一百八步脫步半周自乘三而一圖闕半周三而
  hash: sha256:f1fd7ba13ddc0379b28ad40205d0b76b69745cc51fa6aa6a3f180c3644618fc7
