body:
  text: 十一至十九本法從加十二十四十六十八雖可而是兩次下十九斤每斤十六兩問積兩荅曰三百四兩十六爲法置十九斤身後加六合問十九爲法置十六兩身後加九合問二十一至二十九用連身加先加零數後加身數二十一三因七因二十二倍位加一二十三一定百退七十七二十四倍位加二二十五倍次折半二十六倍位加三二十七三因九因二十八倍位加四二十九連身加物二十一兩每兩二百七十問𠔏幾錢荅曰五貫六百七十文二十一爲法置二百七十用三因又七因合問二百七十爲法置兩數用二因又用九因合問物二百三十六斤每斤價二貫三百問展幾錢荅曰五百四十二貫八百文連身加三爲法置二百三十六斤先加三六一貫八百卻增身六貫又命三十貫加九貫更入身三十貫續命二百貫加六十貫又加身二百貫文合問減七七爲法置二百三十六斤以一定十爲二千三百六十斤從末位命六云六四六二退四十六貫二百後
