body:
  text: 梯田三法長十二步闕二半長六步闕六草併上下廣得十四闕四以下田𣐟周圍十四題闕下田𣐟周圍𠔏用梯田法𠔏誤一頭廣四十步闕四十荅曰十五畝四十步闕畝中廣八步闕廣以正從十二步乘之十誤乘三廣田一頭廣四步田誤四闕一頭乃小梯田一段大梯田一段闕段大以梯田法作兩段半梯田求爲是闕以併上下廣折半闕半中周六步外周三十步闕六闕下周草曰倍中長得十六步倍得竝誤併田畝比類乘除捷法卷下五曹云方田荅一百八十三畝三誤二五曹四不等田草曰句闊十一步句誤內又置梯田闕梯田誤曰直田闊不及長問闊截長二十四步爲方闕二十又商置闊四步又誤人直田闊不及長問長闊𠔏𠔏三千六百闕三圖意法草同前草誤章直田長闊𠔏先求阔從尾末們約實約誤終上商闊二十闕上得四百益積得誤乘次廉之下亦置隅四次廉誤廉次一長一闊𠔏六十爲從方闕𠔏便用減從闕減從須用减從聞之脫開置積八百六十四爲實闕四爲實以上商命餘從四十除積八百
