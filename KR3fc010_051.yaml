body:
  text: 為分為釐得所答數直田通步為尺猶斤稱通兩端匹通尺也後以二題比類直田步下帶尺寸物七斤六兩每斤八貫二百文問錢幾何答曰六寸績四百七寸五文草曰以十六兩通七斤併六兩𠔏一百一十八兩以八貫二百乘得九百六十七貫六百以十六除之合問絹七匹一十二尺每匹價錢九貫二百文問幾何答曰六十六貫七百文草曰以四十八尺通匹併入一十二尺𠔏三百四十八尺以匹價九貫二百文乘得三千二百一貫六百文以元匹法四十八除之合問前題以步通尺以斤通兩以匹通尺皆通分之本法也一術不用通分以零尺零兩繼於全步全斤全匹之後相乘可免通分且如第一題田長三十六步二尺便以二尺為步後四分闊二十四步三尺便以三尺為步後六分仍用長闊相乘以二百四十步除之為畝第二題物七斤六兩其斤外六兩即是斤下三分七釐
  hash: sha256:b7e2ec0d048851fd776b0d5bf1e688bd34cc4cacdc15efce9dcabbe0d83b1aa3
