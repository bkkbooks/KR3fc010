body:
  text: 爲分爲釐得所荅數直田通步爲尺猶斤稱通兩端疋通尺也後以二題比類直田步下帶尺寸物七斤六兩每斤八貫二百文問錢幾何荅曰六寸績四百七寸五文草曰以十六兩通七斤併六兩𠔏一百一十八兩以八貫二百乘得九百六十七貫六百以十六除之合問絹七疋一十二尺每疋價錢九貫二百文問幾何荅曰六十六貫七百文草曰以四十八尺通疋併入一十二尺𠔏三百四十八尺以疋價九貫二百文乘得三千二百一貫六百文以元疋法四十八除之合問前題以步通尺以斤通兩以疋通尺皆通分之本法也一術不用通分以零尺零兩繼於全步全斤全疋之後相乘可免通分且如第一題田長三十六步二尺便以二尺爲步後四分闊二十四步三尺便以三尺爲步後六分仍用長闊相乘以二百四十步除之爲畝第二題物七斤六兩其斤外六兩卽是斤下三分七釐
