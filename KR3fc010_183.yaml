body:
  text: 七十七陌省錢七十四貫問為足錢幾何答曰五十六貫九百八十文七十四為法置七十七陌加一一得八十五貫四百七十減五合問若不減五用二因三歸同七十七為法置七十四貫加一得八十一貫四百退位用七因合問八十一兩次損一八十二加六四折半八十三加六六折半八十四六因加四八十五加七折半八十六加七二折半八十七加七四折半八十八加一損二八十九從尾退乙乙米八百九十石每五省斛八斗三升問為足斛幾何答曰七百三十八石七斗八斗三升為法置米數加六六用折半八百九十為法置八斗三升合是以一定百其尾位是十石合定十約為八百三十石從尾退乙乙合問九十一七因加三九十二四因退七七九十三加八六折半九十四加八八折半九十五加九折半九十六加二損二九十七隔位退三九十八七因加四九十九加一損一田長九十九步闊九十七步問積幾步答曰九千六百三步
