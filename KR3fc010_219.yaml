body:
  text: 二三八減四減七二三九四因隔位見一下四四遇九五六成千成數之外有零者仍用兩折還原命零六百七十五貫七百買絹匹價二貫三百三十問合買幾匹答曰二百九十匹二三三為法置錢數三因為二千二十七貫一百於十貫上定匹見二下六加還二貫又見六下二十四加還八百已得二百八十匹尚餘六十九貫九百法云遇六九九成千又得十匹之數𠔏得二百九十匹合問二四一四因隔一位還三六二四二折半兩次減一二四三三歸兩次九歸二四四減二二折半二四五倍位兩次七歸二四六減二三折半二四七減三減九二四八減二四折半二四九減六六減五二五一四因隔二位退四二五二減四減八二五三四因隔二位退乙二二五四減二七折半二五五減五減七二五六兩次減六二五七四因隔一位退二八二五八折半減二九二五九三因七歸減乙一二六乙減七四減五二六二減三乙折半二六三四因隔一位退五二二六四折半減一減二
