body:
  text: 得幾何荅曰二貫三百六十文一百八十七人爲法若用減二位之術不亦繁矣莫若用重減草曰置支錢總數如商除定人上得貫先減一而後減七合問如一百五十四爲法術用先減一後減四如一百五十六爲法術用先減一後減三隔位減術曰置實數爲身以法命實言十身下減起言如隔位退零絲每一十兩耗三錢今有絲重二千八百二十二兩二錢問上本幾何荅曰二千七百四十兩草曰置絲爲實二千八百二十二兩二錢定位如後隔位減三合問求一代乘除説隨題用法者捷以法就題者拙遇求一題則用求乙法遇九歸題則用九歸法或倍或折或加或減或因或變莫不隨題其執求一之術而統諸題今姑摘其一二載
