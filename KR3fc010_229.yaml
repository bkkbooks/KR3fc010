body:
  text: 互換術曰以所求率金方七分積三百四十三分乘所有數金十六兩爲實以元率金方一寸積一千分爲法除之合問六十四人八日開河一千六百積尺今添夫三十六人今開十二日問開幾積尺荅曰三千七百五十尺重互換術曰六十四人乘八日爲法卽五百十二工六十四人之添三十六人𠔏一百人乘十二日卽一千二百工以乘一千六百尺爲實以法除之應用算法以徑乘代互換者固善其間又有不可代者宜兩存之變換活法遇一除者定位只乘不除二爲除者定位乘訖折步二乘三除置積減五三乘三除不乘除只定位四乘三除互換五乘三除六乘三除二因七乘三除八乘三除互換九乘三除定位三因二百三十四斤每三斤直六百問錢幾何荅曰四十六貫八百文代術用二百乘斤數六百買三斤知每斤二百不必互換二百三十四人每三人支七貫問計幾錢荅曰五百四十六貫文
