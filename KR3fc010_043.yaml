body:
  text: 變折皆歸於乘除中山劉先生作議古根源序曰入則諸門出則直田蓋此議也撰成直田演段百問信知田體變化無窮引用帶從開方正負損益之法前古之所未聞也作術逾遠罔究木源非𢲘𦣱索隱而莫能知之輝擇可作關鍵題問者重為詳悉著述推廣劉君垂訓之意五曹算法題術有未切當者僭為刪改以便後學君子目之曰田畝比類乘除捷法庶少裨汲引之梯徑云爾峕歲在乙亥德祐改元小暑節錢塘楊輝謹序
  hash: sha256:5c1c37d4d90adc938647ab4e462f7a7cbc9cd5e7993d2eb32d13e607f54d7a42
