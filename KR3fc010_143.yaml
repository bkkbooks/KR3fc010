body:
  text: 二百三十四斤每斤四百一十文問錢幾何荅曰九十五貫九百四十文草曰置斤數爲身斤上定十於身前四因之相乘術曰實位居上法位居下以法尾頂實首位非頂首位是頂所乘位也詳尾位之數以定其實法實相因言十過法身言如對法身臨了就實身詳解有注銀二十四兩七錢每兩價錢七貫三百六十文問錢若干荅曰一百八十一貫七百九十二文草曰置銀數爲實兩價爲法兩上定得十文重乘術曰乘位繁者約爲二段作二次乘之庶幾位簡而易乘自可無誤也相乘與定位各從本法三萬八千三百六十七斤每斤價錢二十三貫一百二十一文問錢若干荅曰八十八萬七千八十三貫四百七文
