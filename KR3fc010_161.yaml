body:
  text: 二百三十八畝每畝收粟二石七斗問共幾何答曰六百四十二石六斗不用求一草曰三因畝數又九因合問又草曰置畝收粟數加四加七合問絹二百七十四匹每匹四十八赤問共幾赤答曰一萬三千一百五十二赤求一草曰兩折匹法元四十八赤兩折為十二四因絹數得一千九十六加二合問綾二百七十四匹每匹四十九赤問共幾赤答曰一萬三千四百二十六赤不用求一草曰置綾匹數兩度七因合問求一除曰五六七八九倍之數不走二三須當半遇四兩折為除積相就倍法必倍實折法必折實用減以代除定位求如舊支錢一貫收頭子錢五十六文今收一十三貫二百七十二文問元支錢若干答曰二百三十七貫求一草曰倍法倍五十六為一百一十二倍實為二十六貫五百四十四減一二合問出錢一千三百五十貫九百文買銀每兩五貫七百文問得銀多少答曰二百三十七兩
