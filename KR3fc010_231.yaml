body:
  text: 互換術曰置人數以七貫乘之三人除之二乘四除五因三乘四除加五折半四乘四除不乘除五乘四除加二五六乘四除加五七乘四除互換八乘四除二因九乘四除互換又兩度加五二十八人每四人支銀七兩𠔏支幾何荅曰四十九兩互換術曰置人數以七兩乘之四人除之又術一兩七錢五分乘人數四人分七兩可以四除二乘五除四因積三乘五除六因積四乘五除八因積五乘五除不乘除六乘五除加二七乘五除加四八乘五除加六九乘五除加八二百一十六人每五十人支銀五兩問𠔏幾何荅曰二十一兩六錢五十人支銀五兩卽是每人得銀一錢不必乘除置人數二百一十六人於人上定錢二乘六除置積三除三乘六除折半四乘六除置積減五五乘六除互換六乘六除不乘除七乘六除互換八乘六除七十五乘九乘六除加五互換遇七數者無折變仍從互換二乘八除兩折半三乘八除三因加二五四乘八除折半五乘八除減六
