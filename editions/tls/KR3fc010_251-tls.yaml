body:
  text: 島之法亦循循誘入之意海島題解魏劉𡽪注九章立重差著於勾股之下以闡世術夫度高測㴱勾股之法則無自而可知故重表累矩三望四望旁求審察是以松山高下方邑大小其重表也岸望谷㴱山望津廣其累矩也登望松高遙望波口非三望之術乎淸淵白石登山臨邑非四望之術乎海島去表爲之篇首因以名之實九章勾股之遺法也迄今千餘載間唐李淳風而續算草未聞解白作法之旨者輝嘗置海島小圖於座右乃見先賢作法之萬一若欲盡傳豈不輕易祕旨或不傳流亦無以伸前賢之美本經題目廣遠難於引證學者非之今將孫子度影量竿題問引用詳解以驗小圖姑以一問其餘好學君子自能觸類而攷何必輕傳本經今有望海島立二表高三丈前後參直相去千步人從前表卻行一百二十三步人目着地取望島峯與表末參合復從後表卻行一百二十七步人目着地取望島峯亦與表末參合問島高及去表遠各幾何荅曰島高四里五十五步前表至島遠一百二里一百五十步本術曰表高乘表間爲實相多爲法除之所得加表高卽得島高臣淳風等謹按此術意宜云島峯謂山之頂上立兩表齊謂立表木令端直以人目於木末望島參平人去表一百二十三步爲前表之始後立表末至人目於木末相望去表一百二十七步二去表
