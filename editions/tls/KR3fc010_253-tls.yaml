body:
  text: 相減爲相多以爲法前後表相去千步爲表聞表高乘之爲實以法除之加表高卽是島高積步得一千二百五十五步以里法三百步除之得四里餘五十五步是島高之步數也求前表去島遠者以前表卻行乘表間爲實相多爲法除之臣淳風等謹案此術意宜云前去表乘表間得一十二萬三千步以相多四步爲法除之得數又以里法三百步除之得表去島遠數假如竿不知高從竿腳量遠二十五尺立一丈表表後退行五尺用窺穴望表與竿齊平其人目窺穴高四尺問竿高幾何荅曰四十尺九章以表望山術曰以表高一丈退人目四尺以餘六尺乘表去竿遠二十五尺得一百五十尺以退行五尺除之得三十尺併表高一丈𠔏高四十尺解術曰直田之長名股其闊名勾於兩隅角斜界一線其名弦弦之內外分二勾股其一勾中容橫其一股中容直二積之數皆同以餘勾除橫積得積外之股以餘股除直積得積外之勾二者相通木高名股木至人目卽是通勾所立之表乃勾中容橫之界限限外至人目卽
