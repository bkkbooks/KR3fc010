body:
  text: 四十五句餘置不用算家惟恐無數可致豈得有數不用者乎嘗於日用詳解二集刊陰陽字分賓主𠔏存之且問二十三四合數中素無者或三七五一八七五爲法捨相乘何以代之原一百法載之後題矧此算無定法惟理是用已矣銀二百三十七鋌每鋌二十三兩問𠔏重幾兩荅曰五千四百五十一兩術曰置銀鋌數爲實如省錢歸足七十七法從尾位損之葛布二百三十七匹每匹四十六赤問𠔏幾赤荅曰一萬九百二赤草曰倍布數爲實二百三十七匹如前法求之葛布二百三十七匹每匹三貫七百五十文問錢幾何荅曰八百八十八貫七百五十術曰置布匹數以斤求兩價念法從尾損之一求尅退六二五二求尅退一二五
