body:
  text: 解術曰前表是第一圖以表望木後表是第二圖以表望木蓋恐未易總説所以分作兩圖解白古人以二圖沓用設海島爲題以重差爲術前表去木遠乃小股中容積一段後表去木遠乃大股中容積一段以小容積減大容積其餘減不盡者正在前後表兩界之中名表間積所以古人以表高乘表間爲實以前圖小餘股減後圖大餘股以餘除表間積得弦外之高本是大容積減小容積餘爲實小餘股減大餘股餘爲法以法除實求弦界外之高加表高增人目高爲木之通長今恐後人不知先賢用心之源故以隔水望木二題爲問驗重差之術引用海島第一題好事者得之自可引而伸之以發其餘豈小補哉續古摘奇算法
