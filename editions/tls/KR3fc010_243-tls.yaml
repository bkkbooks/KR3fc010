body:
  text: 爲積七十一步一百五十七分步之一百三密率求積令圓周自乘又七乘周如八十八而一爲積七十一步二十二分步之一十三二積以課分術求同分母𡽪術得積七十一步三千四百五十四分步之二千二百六十六密率得積七十一步三千四百五十四分步之二千四十一二術言之圓三徑一亦未爲是古人取圓三方四之義故行圓三徑一之法九章有勾三股四弦五之率無方五斜七之數直積以長爲股方積以方面爲闊爲勾斜爲弦勾爲股斜爲弦圓徑以徑數爲弦勾股求弦術曰勾股各自乘併而開方求弦勾弦求股術曰勾自乘減弦自乘開方求股股弦求勾術曰股自乘減弦自乘開方求勾假如自方五尺計積二十五尺取方面爲勾爲股依術
