body:
  text: 頭截地八百二十二步半問所截長闊各幾步荅曰截長三十五步截闊二十七步先求長術曰二因截積元長乘之如闊差而一爲實倍南闊以元長乘之如闊差而一爲從法開方除得截長以闊差乘長如元長而一得截闊草曰二因截積得一千六百四十五步以元長九十步乘以闊差十八除得八千二百二十五步爲實二因南闊以元長乘之如闊差而一得二百爲從法開方除得截長先求闊術曰二之截積以闊差乘之元長除之併小頭闊自乘開平方除之得截闊併兩廣折半除截積卽長又草曰二之截積得一千六百四十五步以闊差十八步乘之以元長九十步除之得三百二十九步又小頭二十自乘併之𠔏得七百二十九開平方除之先得截闊併兩廣𠔏四十七步折半除截積得長步合問梯田長九十步小頭闊二十步大頭闊三十八步今自大頭截田一千七百八十七步半問所截長闊荅曰截長五十五步小頭闊二十七步
