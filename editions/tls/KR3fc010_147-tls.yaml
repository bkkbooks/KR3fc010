body:
  text: 九言十過法身言如對法身除之定位以價爲法求物數者以法首之數定實以物數爲法求價者隨法尾所指處定爲所得出錢七百二十九貫買物每兩二貫四百三十文問物幾兩荅曰三百兩其一術草曰置出率爲實七百二十九貫以求率爲法二貫四百三十法首與實首相頂置位定兩十兩以法首之數定實法首是貫於貫上定得兩約至百貫上定百兩上商置三百兩以法除之適盡合問出錢二貫四百三十文買物七千二百九十枚問買幾何荅曰二錢買三枚其二術草曰置物數爲實七千二百九十易錢數爲法二貫四百三十法首與實首相頂置位隨法尾所指處爲所得法尾是十文上指實十枚卽知一文得一枚也上商三卽得三枚以法除之適盡合問算法通變本末卷上
  hash: sha256:5b1b6e8acac89d39d163d52134364a1ade373c9b8e38ff99f63c633f0ad1a304
