body:
  text: 術曰倍積自乘爲實四因積步爲上廉四因徑步爲下廉五爲負隅開三乘方除之得矢以矢除倍積減矢卽弦草曰倍田積自乘得四千九十六步爲實因因積步得一百二十八爲上廉別四因徑步得五十二爲下廉置五算爲負隅於實上商置得矢四步以命負隅五減下廉二十餘三十二以上商四步依三乘方乘下廉入上廉𠔏二百五十六又以上商四步乘上廉得一千二十四爲三乘方法以上商命方法除實盡得矢四步別置二因積六十四以矢四步除得一十六減矢四步餘十二步爲弦合問圓田於內截弦矢田一段弦長十二步矢闊四步問圓田元徑幾步荅曰一十三步輝術曰半弦自乘爲實以矢除而併矢卽圓田徑步也圖勢同前草曰半弦六步自乘得三十五步以矢四步除得九步
