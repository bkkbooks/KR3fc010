body:
  text: 闕除餘從二十步一退闕二十直田長闊𠔏先求長置積爲實下闕一字餘正積三十六闕正以下復命上商除實命誤合直田長闊𠔏問長多闊一段差方積闕一餘得差方一段闕餘得又四因轟積得三千四百千誤十闕百以少減多餘一百四十四闕一百四直田三長五闊𠔏問元闊闕三又上商闊四步又誤入商誤置餘八命上商除實闕上直田三長五闊𠔏問長術曰五之積步爲實五誤三以三爲負隅三誤五五之田積得四千三百二十得誤德復以上商三十命餘從復誤後直田一長二闊三和四較𠔏問闊三和內有三長三闊并入一長二闊闕三闊幷又以四較併四闊爲四長闕四所以用八因積步闕以用命上商闊二十除實餘一千七十二餘誤除直田一長二闊三和四較𠔏問長一之積爲實脫爲實尙餘正積一千二百九十六正誤負以減七十二餘負從一百六十八闕二闕從又上商長六步命隅八得四十八幷從得誤乘闕十八幷方田圓田各一段只云方田而與圓田徑相等闕徑七爲隅算闕七爲隅而四圓田恰及三箇方田闕三箇餘二千七百七十二步千誤十
