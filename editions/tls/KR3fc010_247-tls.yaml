body:
  text: 直田長七百二十尺闊四百八十尺問田幾何荅曰五十七畝六分本法長闊尺數相乘爲積畝法除之一畝六千尺一分六百尺一釐六十尺一毫六尺求畝術曰半長三百六十半闊二百四十相乘得八萬六千四百尺減五於千尺上定畝二曰六除長以闊乘之於千尺上定畝三曰三除長以半闊乘之千尺上定畝四曰三除闊以半長乘之千尺上定畝直田長三十六步二尺四寸闊二十四步三尺二寸問田幾何荅曰三畝七分四釐五毫二絲八忽本術草曰以步尺法一步五尺通長闊步皆爲步長得一千八百二十四寸闊得一千二百三十二寸相乘爲積寸二百二十四萬七千一百六十八寸如寸畝法六十萬而一十萬寸上定畝求畝術曰半長九百一十二寸乘闊一千二百三十二寸得一百十二萬三千五百八十四寸三而一十萬寸上定畝合問二曰六除長三百四寸乘闊一千二百三十二寸於十萬寸上定畝
