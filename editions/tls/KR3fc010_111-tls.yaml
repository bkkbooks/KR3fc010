body:
  text: 及三箇方田總是七箇方積故用七爲隅算開出七箇平方田亦圓田之徑也草曰四因𠔏積得九千七十二步以七爲正隅於百下約實上商三十命正隅七置二百一十爲方法命上商除實餘二千七百七十二步二因方法一退爲廉隅法再退又於上商置六以命隅七乘四十二爲隅併入廉法以廉隅二法皆命上商除實盡得方田面三十六步而圓田徑亦同也重議古截田圭垜一段正長七十五步南尖北闊三十步今於小頭截地四百五步問所截長闊各幾何荅曰截長四十五步截闊一十八步術曰二之截積以元長乘之元闊而一開平方爲截長置截長以元闊乘之元長除之爲截闊草曰二之截積得八百一十步以元長乘得六萬七百五十元闊三十除得二千二十五爲實開平方得截長四十五步元闊乘截長得一千三百五十步以元長七十五步除得截闊十八步合問梯田一段長九十步南闊二十步北闊三十八步今自南
