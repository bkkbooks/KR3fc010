body:
  text: 荅曰雞翁八隻直四十文雞母十一隻直三十三文雞雛八十一直二十七文張𠀉建算經術云雞翁每增四雞母每減七雞雛每益三謂已成數上增減也本經自云疑其從來闕文流傳旣久無可攷證今將細草參攷於已算出數上增減正無本法元草曰置錢一百文爲實又置雞翁一雞母一各以雞雛三因之雞翁得三雞母得三并雞雛三併之𠔏得九爲法除實得十一爲雞母數不盡一返減下法九餘八爲雞翁數別列雞都數百隻減去雞翁八雞母十一餘八十一爲雞雛數置翁母雛價因之合問前法草曰置所荅數雞翁增四得十二隻雞母減七得四隻雞雛益三得八十四隻𠔏百雞合問錢一百買溫柑綠橘匾橘𠔏一百枚只云溫柑一枚七文綠橘一枚三文匾橘三枚一文問各買幾何荅曰溫柑六枚計四十二文綠橘十枚計三十文匾橘八十四枚計二十八文辯古通源算草曰置錢一百以三因爲三百分內減𠔏數一百枚餘二百分爲實三因溫柑價得二十一內減一餘二十分又三因綠橘價得九內減一餘八分併之得二十八爲法除實得六枚乃溫柑綠橘各六枚之數實餘三十二分以元法二十八減去溫柑二十分餘八
