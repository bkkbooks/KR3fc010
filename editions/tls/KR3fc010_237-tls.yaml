body:
  text: 三人均一百欲令乙得甲三分之二丙少甲二十八文問各幾何荅曰甲四十八文乙三十二文丙二十文術曰增二十八併一百爲總錢以應丙少甲二十八文之數題云乙得甲三分之二當以甲衰三乙衰二丙亦衰三併八爲法各以衰乘總錢以法降之各得卻於丙內退二十八合問指南算法有四六差分遞用加五可以致其數如甲衰四加五爲乙之衰又於六上加五得九爲丙之衰輝因到姑蘇有人求三七差術繼荅之尢不可不得以補衰分之萬一今有四人分錢九百二十八貫欲遞以三七差分問各得幾何荅曰甲五百四十八貫八百文乙二百三十五貫二百文丙一百貫八百文丁四十三貫二百文術草曰列置甲乙丙七丁三丙七不可爲三宜以三因丙丁數生乙差甲乙丙丁乙之差不可爲三亦以三因下位生甲差甲乙丙丁副併四差得五百八十爲法以所均之錢各乘列衰以
