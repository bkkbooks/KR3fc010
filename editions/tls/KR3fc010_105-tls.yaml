body:
  text: 草曰三之田積得二千五百九十二步爲實置五算爲負隅依法於百位下約十置從方二百二十八於負隅級上進一位上商置闊二十步乘負隅減從一百以餘從一百二十八命上商除實二千五百六十餘積三十二步復以上商命負隅又減從一百餘從二十八退一位負隅退二位又上商闊四步命負隅減從二十餘八命上商除實盡得闊二十四步合問直田積八百六十四步只云三長五闊𠔏二百二十八步問長幾步荅曰三十六步術曰五之積步爲實𠔏步爲從方以三爲負隅開平方除之演段曰五之積步以應五闊三爲負隅於元從減去三長開方草曰五之田積得四千三百二十置三爲負隅於百步下定十置二百二十八步爲從方進位上商置長三十步命負隅三減從九十復以上商三十命餘從一百三十八除實四千一百四十餘積一百八十復以上商三十命負隅又減從九十餘從四十八步一退負隅二退
