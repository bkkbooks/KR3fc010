body:
  text: 隔水有竿不知其高立二表各高一丈前後相去一十五尺自前表退行五尺於窺穴內望表與竿齊平又從後表退行八尺亦窺穴望表與竿齊平問竿高幾何荅曰竿高四十尺前表去竿隔水二十五尺海島術曰以表高乘表間爲實以二表退行尺數相減餘相多爲法除實併表高卽山高求前表去竿隔水遠者以前表退行數乘表間爲實以相多爲法除之小餘股減大餘股之餘以除表閒積得表外木高加表倂人目爲通長大股容積界限名後表此段小股減大股之餘名表高乘表閒積
