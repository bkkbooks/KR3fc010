body:
  text: 或用半周半徑相乘以上六法竝周三徑一密率以周自乘七因之如八十八而一徽術以周自乘又二十五乘之如三百一十四而一密率求徑曰以七乘周如二十二而一求積以徑自乘又十一乘之十四而一徽術求徑曰以五十乘周一百五十七而一求積徑自乘又一百五十七乘之二百而一圓田周十八步徑六步問積幾步荅曰二十七步周十八步無以驗其數故用徑六步爲圖周三徑一槪可知矣又見圓居方四分之三周自乘十二而一圖周十八步自乘得三百二十四步爲積以十二除之得二十七步合問
  hash: sha256:e8f6c383f6d2e54c2b260a597c1d2d8b0e7c24282788c6a9280c9c863ef782df
