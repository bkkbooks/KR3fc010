body:
  text: 命負隅置六於負積以下復命上商除實盡得長三十六步合問直田積八百六十四步只云長闊𠔏六十步問長多闊幾何荅曰十二步和步求差術曰四之積步減和自之積餘開平方除之得長闊之差步演段曰和自乘有四段直田積一段差方積所以用四積減和方餘得差万一段卻取方面草曰𠔏步六十自乘得三千六百步又四因田積得三千四百五十六步以少減多餘一百四十四卽差方一段也開平方得見差步十二直田積八百六十四步只云三長五闊𠔏二百二十八步問元闊幾何荅曰二十四步益積術曰三之積步爲實𠔏步爲從方五爲隅算開平方除之演段曰題云三長故三之田積是求出三長比元題尙少五闊故以五爲益隅明是暗添入五段闊方之積方應從方除數
