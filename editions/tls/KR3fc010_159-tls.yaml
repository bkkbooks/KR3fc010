body:
  text: 之後題以求一乘曰五六七八九倍之數不走二三須當半遇四兩折倍折本從法實卽反其有倍法必折實倍實必折法用加以代乘斯數足可守錢二百三十七貫每貫收頭子錢五十六文問𠔏若干荅曰一十三貫二百七十二文求一草曰倍法倍五十六爲一百一十二折實折總錢數折作一百一十八貫五百加一二合問買銀二百三十七兩每兩五貫七百問錢幾何荅曰一千三百五十貫九百文不用求一草曰三因銀數加九合問二百四十九人各支米六十二升問𠔏幾何荅曰一百五十四石三斗八升求一草曰倍法倍六斗二升作一石二斗四升折實米數折作一百二十四人半加二四合問二百四十九人各支粟六斗三升問𠔏幾何荅曰一百五十六石八斗七升不用求一草曰七因人數又九因合問二百三十八畝每畝二百四十步問𠔏幾步荅曰五千七百一十二步求一草曰半法畝法折半作一百二十步倍實倍畝數得四百七十六加二合問
