body:
  text: 外周自乘以少減多餘開平方除之得所截內周以內周減外周餘六而一卽徑也草曰外周相減餘四十八乘二因積步得二萬七千三百六十元徑八步除得三千四百二十又外周自乘得五千一百八十四步以少減多餘一千七百六十四爲實開平方除之得內周四十二步以內周減外周七十二餘三十以六除之卽徑五步環田外周七十二步中周二十四步實徑八步欲從內周截地一百九十五步問所截外周實徑各幾步荅曰截徑五步外周五十四步術曰二因積步爲實以徑步除二周差步爲正隅二因中周爲從方開平方除之得所截徑步副置徑步六因併中周爲外周草曰二因積步得三百九十步爲實二周相減餘差四十八以徑八步除得六步爲正隅二因中周得四十八爲從方開平方除得徑五步別置徑五步六因併中周得五十四步爲截外周合問圓田一段直徑十三步今從邊截積三十二步問所截弦矢各幾步荅曰弦十二步矢四步
