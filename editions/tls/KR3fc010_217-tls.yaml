body:
  text: 九九成百二乙二折半隔位減六二乙三減四二減五二乙四折半隔位減七二乙五六因減二九二乙六減二減八二乙七減四又減五五二乙八折半隔位減九二乙九減四六減五二二乙減三減七二二二減乙乙折半二二三四因九歸見一隔二位還八遇八九二成千二二四減四減六二二五四因九歸二二六減一三折半二二七三因七歸隔一位還一九見六八一成千二二八減二減九二二九三因七歸見一隔一位還十三歸後還數以補闕欠逐位歸訖隨手還零米六百二石一斗各支二石二斗三升問給幾人荅曰二百七十人二二三爲法置米數四因得二千四百八石四斗於十石上定人用九歸百位見二下二如還二八十六石又見六下加六還六八四石八斗已得二百六十人尙餘八十九石二斗法云遇八九二成十又得十人之數通得二百七十人合問二三一歸減二三二減一六折半二三三三因七歸隔二位見一還一遇六九九成千二三四減三減八二三五六因減四一二三六減乙八折半二三七減五八減五
