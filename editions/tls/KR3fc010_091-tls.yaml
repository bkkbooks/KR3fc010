body:
  text: 旣知根源而於心無懞昧矣今姑摘數問詳注圖章以明後學其餘自可引而伸之觸類而長不待盡述也直田積八百六十四步只云闊不及長一十二步問闊幾步荅曰二十四步術曰置積爲實以不及步爲從方開平方除之置積爲實別置一算名隅從實尾超一位約實至百數下定十步商位置積方法從方隅算商第一位數圖上商置闊二十乘隅算於從方之上置二十名曰方法以方數從數皆
