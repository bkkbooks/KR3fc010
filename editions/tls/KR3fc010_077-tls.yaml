body:
  text: 三廣田一頭廣四步一頭廣六步中廣八步正從一十二步問田幾何荅曰七十八步倍中闊爲十六併兩廣十步𠔏二十六用長十二乘得三百一十二以四除之三廣田乃小梯田一段大梯田一段下闊相抵或遇此等田勢中闊在正中可用此術中闊若偏近一頭祇得作兩段求庶不錯誤台州量田圖有曲尺田內曲十二步外曲二十六步兩頭各廣七步問田幾何荅曰一百三十三步內曲卽梯田上闊外曲卽梯田下闊頭廣卽梯田之長步術用併內外曲得三十八步以一頭廣七步乘之折半合問原此田勢乃梯田斜袤相連本梯田也或遇此等田勢兩頭廣步相等者可用若兩頭廣步不同以梯田法作兩段半梯田求爲是環田中周六步外周三十步徑四步問田幾何荅曰七十二步
