body:
  text: 三求一八七五四求退尅二十五五求三一二五是六求除退三七五七求四三七五退八求就身退除五四百三十二人各支九貫七百問𠔏幾何荅曰四千一百九十貫四百文諸括不可入題者術曰置人數爲實以虧數隔位損之草曰置人數爲實以虧數法九貫七百比十一貫虧三百隔位損之定位詳説視題用法本無定據所用因折加減歸損各有定位若諸法互用重用定位殆將不可律論矣恐爲學者惑今立定率術曰先以乘除本法定所得位訖而後重互雜法必無誤礙也前立請術必命題草以試可用然恐不能再四今以乘除
