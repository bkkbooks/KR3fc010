body:
  text: 命三云三二三乙退二百三十一貫後命二云二乙五四退一千五百四十貫三十一至一百用雜法三十一身前因三三十二倍位加六三十三二因加一三十四二因加七三十五七因折半三十六二因加八三十七加一乙用三除三十八二因加九三十九三因加三田長四十一步闊三十一步問積步答曰一千二百七十一步三十一為法置四十一步首位身前因三先命四云三四下千二百再命一身前下三十步田長四十二步闊三十七步問田幾何答曰一千五百五十四步三十七為法置長步一上定百先命二加二十二又命四加四百四十共數以三歸除之合問四十一兩折加六四四十二三因加四四十三加七二兩折半四十四四因加一四十五九因折半四十六二因退七七數四十七加八八兩折半四十八三因加六四十九兩次捐三綢六十二匹每匹四丈九尺問共幾尺答曰三千三十八尺
