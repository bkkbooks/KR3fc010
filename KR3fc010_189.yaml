body:
  text: 置綾數倍得二百九十六匹從上位身前七因又曰置價錢加二又加一乙用九歸各合問百五一加五一百五二八因加九百五三九因加七百五四加一加四百五五加五五百五六加二加三百五七加五七百五八加五八百五九加五隔位加六物一百五十九斤每斤一百五十一問錢幾何答曰二十四貫九文置斤數身外加五乙兩位斤上定百合問置斤價加五又隔位加六合問百六一七因退七七百六二倍位兩次九因百六三加六三百六四加六四百六五加一加五百六六加六六百六七加六七百六八加二加四百六九兩次加三物二百六十一斤每斤一百六十一問錢幾何答曰四十二貫二十一文置物數七百因之從尾退七七合問連身加為法置斤價一百六十一命乙先加六十一次加身百再命六加三貫六百六十加身六貫又命一加六貫一百加身十貫合問百七一加九損乙百七二加七二百七三加七三百七四加七四百七五七因又兩次五因
