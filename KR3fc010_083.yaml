body:
  text: 答曰七十二步原此田勢乃是半梯田二段下闊相連併東西長又倍中長以闊步乘之兩折半草曰倍中長得十六步併東西長共二十四步以闊乘之兩折半得七十二步合問四畝比類乘除捷法卷上
