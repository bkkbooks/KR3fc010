body:
  text: 答曰二千九百六十三匹三丈九尺術曰齊人數得尺數求如合分法入互換草曰人數為分母絹數為分子右三人四人母互乘子左七十尺五十尺併之為法右上乘左下得一百五十右下乘左上得二百八十併得四百三十尺母相乘為實右三四相乘得十二人入互換法以四百三十尺乘兵士總人三千四百七十四人以十二人為法除之合問差分題數無零者差分互換商除三法自可通用或有分子而三法不互用也九章衰分問五人均五鹿用一二三四五為衰如牛馬羊均粟用一二四為衰女子善織日自倍用一二四八十六為衰三鄉發徭以各鄉多寡人數為衰皆準繩之數惟應用算法衰分兼帶定率亦可為法三人均一百只云甲多乙五文丙得錢如乙七分之五問各幾何答曰甲四十文乙三十五文丙二十五文術曰於百文內先減出甲多乙五文餘九十五文題云丙得乙七分之五丙當以五為衰甲乙各以七為衰併之得十九為法以九十五乘列衰以法除之得數卻增元減五文添甲合問
