body:
  text: 上乘商除用言如對身言十過身乙三如川添一箇三是二三如丅又添一箇三是三三如皆不出本位故曰言如對身三三如上更添一箇三是三四十二其十揭歸上位對下零故曰言十過身下乘加減用言十當身言如下布上乘臨了乘實位故取言十過身言如對身下乘與加減竝以實爲首位凡言十者當身布起若言如數從次位布起故法言十當身言如下布辨因乘損三法卽一指南算曰眾位名乘兩位三位以上單位名因一位名損一位殊不思三位法乘一位實仍是一位實因三位法知此而因與乘初無異也古人立相乘二字法實通用尢爲有證又曰上生出者名因爲乘以一乘九謂之因又曰口誦者爲因下損出者亦爲乘十損一得九十卽一也如此因與損卽乘之易名也因損一體圖生數爲因名乘退數爲損名乘
  hash: sha256:bddb0d6c1fb485fa441001aea20363db08f349bfcd43a613cbcade0d2e878aaa
