body:
  text: 上乘商除用言如對身言十過身乙三如川添一箇三是二三如丅又添一箇三是三三如皆不出本位故曰言如對身三三如上更添一箇三是三四十二其十揭歸上位對下零故曰言十過身下乘加減用言十當身言如下布上乘臨了乘實位故取言十過身言如對身下乘與加減並以實為首位凡言十者當身布起若言如數從次位布起故法言十當身言如下布辨因乘損三法即一指南算曰衆位名乘兩位三位以上單位名因一位名損一位殊不思三位法乘一位實仍是一位實因三位法知此而因與乘初無異也古人立相乘二字法實通用尢為有證又曰上生出者名因為乘以一乘九謂之因又曰口誦者為因下損出者亦為乘十損一得九十即一也如此因與損即乘之易名也因損一體圖生數為因名乘退數為損名乘
  hash: sha256:ee9f2d151d01ea2db047868ed9a78d8839486440ec38d5550a402a058df78c26
