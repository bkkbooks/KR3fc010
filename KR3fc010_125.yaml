body:
  text: 錢塘楊輝編集習算綱目先念九九合數一一如一至九九八十一自小至大用法不出於此學相乘起例並定位功課一日溫習乘法題目自一位乘至六位以上並定位功課五日學商除起例並定位功課一日溫習除法題目自一位除至六位除以上並更易定位功課半月日既識乘除起例收買五曹應用算法二本依法術日下兩三問諸家算法不循次第今用二書以便初學且未要窮理但要知如何發問作如何用法答題如何用乘除不過兩月而五曹應用已算得七八分矣詳解算法第一卷有乘除立問一十三題專説乘除用體玩味注字自然開曉諸家算書用度不出乘除開方三法起例不出如十二字下算不出橫直二位引而伸之其機殆無窮盡矣乘除者本鈎深致遠之法指南算法以加減九歸求一旁求捷徑學者豈容不兼而用之學加法起例并定位功課一日
  hash: sha256:22447effd29dffb3d41b761b86006c5061a5e90a9bc1d24fc20c7d365287e0a9
