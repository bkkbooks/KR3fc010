body:
  text: 又七乘之闕七以八十八除之闕十八不可用圓田術闕用圓畹田下周三十步徑十六步闕畹三闕十六答曰一百二十步闕答曰圓用周三徑一之法闕圓用誤田合徑一十步闕一十圖原闕上半今補又方圖闕大半今帷補明周三十步徑十六步及得一百二十步意𠀉田外周六百四十步闕周六答曰二頃五十三畝八十步闕八十得二十四萬三千二百步誤二萬四千三百二十步即句股田勢田誤曰今有牛角田闕牛角今有環田答曰二畝五十五步闕二闕五五除得答數闕得術曰并中外周闕術以少減多餘為實十二而一闕以少减十二而一外周之數上闕四字以內周減外周闕以內周減外環田上闕六字下闕二字不可不審下闕一字題云中周六十二步闕步合徑八步二十四分闕十誤刋作徑十二步誤刋倒合得七百四十五步一百九十分步之七十五闕百四闕下七分母四通六十二步闕六十二比類闕類本法外周加六闕加圭田三法用半廣以乘正從闕以乘用半縱步闕半半縱乘廣圖乘誤東句乃闊步闕闊問田幾何闕田幾何答曰四十八步闕答曰闕八闊八步闕闊長十二步闕十二誤一
