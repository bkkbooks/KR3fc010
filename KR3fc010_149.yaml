body:
  text: 錢塘楊輝編集加法五術一曰加一位二曰加二位三曰重加四曰加隔位五曰加五位加一位術曰以所有物數為實為身以法首之數定為得數以所求物價一後零數於身後加之言十當身布起言如次身求之足錢九十六貫二百五十文問伸作七十七陌幾何答曰一百二十五貫文草曰足錢為身身下加三望貫除一猶加三以一代七十七除也望貫者退位於第四位除文置足錢為身貫上定貫加三得一百二十五貫一百二十五文望貫除文上是一百二十五貫下除一百二十五文合問出錢二百七十四貫買物每斤六貫二百五十問買得幾斤答曰四十三斤一十三兩四錢四分術曰加六以代六二五除也草曰置總錢為實二百七十四貫貫上定斤用加求斤得四十三斤八分四釐斤外有分零加六為兩合問加二位術曰以所有物數為實為身以法首之數定為所得數以所求物價一後二位零數於實身後先加第二位
