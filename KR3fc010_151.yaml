body:
  text: 言十次身布言如隔位加卻加第一位言如次身置言十起當身求之官收稅錢三百四十二貫每貫扣納頭子錢五十六文問收錢幾何答曰一十九貫一百五十二文頭子錢有加一二折半之法是身外加二位草曰置總錢三百四十二貫先隔位加二次加一加畢折半重加術曰題法煩者約之用加一位之法加訖重加定位並稅錢二百四十七貫每貫扣納不係省錢一文九分五釐問幾何答曰四百八十一文六分半法身下有二位必煩而用重加草曰置稅錢為身貫上定文先加三又加五合問又草置一文九分五釐先加三又加九亦同加隔位術曰為身以法數言十身後布起言如隔位加零稑地一百七畝價一十貫六百文問值幾何
