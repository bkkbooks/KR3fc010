body:
  text: 又曰三因周步用九歸合問羅三百四十五丈每疋長五丈問該幾疋荅曰六十九疋五爲法草曰倍羅數退位合問銀一千六百八十兩每人支七兩問合給幾人荅曰二百四十人七爲法置總數爲實如七歸求之又用倍銀數爲實身內減四合問足秤二百三十二斤問展省秤多少荅曰二百九十斤足秤八斤卽是十斤省秤合用八歸今置足斤爲實身外加二五以代八歸又曰倍足斤爲實身內減六合問穀一石取米九㪷今米二百七石問元穀多少荅曰二百三十石九斗爲法置米數爲實九歸求之又曰倍米數爲實身外減八竝同十一至十九總述從上位減十一減一十二折半加五九歸十三減三十四折半七歸十五二因三歸十六折半卻加二五十七減七十八折半九歸十九減九
