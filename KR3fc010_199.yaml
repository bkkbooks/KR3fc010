body:
  text: 又曰三因周步用九歸合問羅三百四十五丈每匹長五丈問該幾匹答曰六十九匹五為法草曰倍羅數退位合問銀一千六百八十兩每人支七兩問合給幾人答曰二百四十人七為法置總數為實如七歸求之又用倍銀數為實身內減四合問足稱二百三十二斤問展省稱多少答曰二百九十斤足稱八斤即是十斤省稱合用八歸今置足斤為實身外加二五以代八歸又曰倍足斤為實身內減六合問穀一石取米九㪷今米二百七石問元穀多少答曰二百三十石九斗為法置米數為實九歸求之又曰倍米數為實身外減八竝同十一至十九總述從上位減十一減一十二折半加五九歸十三減三十四折半七歸十五二因三歸十六折半卻加二五十七減七十八折半九歸十九減九
