body:
  text: 重下闕一字圭𣐟一段今於小頭截地四百五步問所截長闊各幾何闕五闕問開平方為截長開誤闊闕平梯田一段二因截積元長乘之闕積元長為從法闕為從開方除得截長長誤闊截長五十五步長誤積又草曰草誤章梯田長九十步闕梯田開平方除之得截闊截闊誤闊截梯田長一百二十步今自截長北頭一半闕今又併北闊為所截闊闕截環田自外周截積以少減多脫以環田從內周截地田誤曰二周相減周誤減圓田從邊截積得四千九十六步為實脫為實下廉誤圓田於內截弦矢田併矢四步闕矢四錢田積七十二步得內方之數脫得又面徑乘內方十二段乘誤之命從方除實方誤命算法通變本末卷上諸家算書本鉤深致遠之法脫遠開方乃算法中大節目二曰開平圓開誤積庶久而無失忘矣忘誤忌九章二百四十六問只須一日下遍遍誤編
