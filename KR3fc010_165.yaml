body:
  text: 百八十八赤減二合問綾一萬三千四百二十六赤每匹四十九赤問計幾匹答曰二百七十四匹不用求一草曰置綾匹數兩度七歸合問九歸詳説一位為法為除則用九歸代之若兩三位商除自合伸用今人以第一位用歸以第二位第三位仍用商除二法也原九歸古括初未嘗拘二至九而已輝嘗原而為歌括凡二位除者亦可用混然歸法必而又商除姑摘一二載之後題以表歸除之不拙也九歸新括以古句今注兩存之歸數求成十九歸遇九成十八歸遇八成十七歸遇七成十六歸遇六成十五歸遇五成十四歸遇四成十三歸遇三成十二歸遇二成十歸除自上加九歸見一下一見二下二見三下三見四下四八歸見一下二見二下四見三下六七歸見一下三見二下六見三下十二即九六歸見一下四見二下十二即八五歸見一作二見二作四四歸見一下十二即六三歸見一下二十一即七半而為五計九歸見四五作五八歸見四作五七歸見三五作五六歸見三作五五歸見二五作五四歸見二作五三歸見一五作五二歸見一作五定位退無差商除於斗上定石者今石上定斗商除人上得文者今人上定十足斛米二百二十九石八升問為八斗三升法斛幾何答曰二百七十六石
