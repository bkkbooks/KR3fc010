body:
  text: 命負隅置六於負積以下復命上商除實盡得長三十六步合問直田積八百六十四步只云長闊共六十步問長多闊幾何答曰十二步和步求差術曰四之積步減和自之積餘開平方除之得長闊之差步演段曰和自乘有四段直田積一段差方積所以用四積減和方餘得差万一段卻取方面草曰共步六十自乘得三千六百步又四因田積得三千四百五十六步以少減多餘一百四十四即差方一段也開平方得見差步十二直田積八百六十四步只云三長五闊共二百二十八步問元闊幾何答曰二十四步益積術曰三之積步為實共步為從方五為隅算開平方除之演段曰題云三長故三之田積是求出三長比元題尚少五闊故以五為益隅明是暗添入五段闊方之積方應從方除數
  hash: sha256:99f65e160db7825f7d88cbe67464310b400f8bbe8d4d6a7f58fa172d6fc58e85
