body:
  text: 天元如積之術其開方步法縱橫布算之式與秦道古數書同此卽出於中山劉君者也通變卷內有代乘代除各三百題今巿井俗人所謂飛歸者正復相似考夏侯陽算經已有以幾𣸸之身外減幾之語葢此種超徑等接之術濫觴於唐以前矣書中所稱應用算法詳解算法指南算法九章纂類議古根源辨古通源各書今皆未見不審海內尙有流傳之本否也又法算取用本末卷有史仲榮名未詳何人當攷
