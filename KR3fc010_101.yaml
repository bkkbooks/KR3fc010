body:
  text: 命餘從四十除積八百餘積六十四以上商乘負隅又減從方二十餘從二十步一退負隅一退又於實上商置闊四步以乘負隅減從方四餘從十六命上商除實盡得闊二十四步合問直田積八百六十四步只云長闊𠔏六十步欲先求長步問得幾何答曰三十六步翻積術曰置積為實和步為從方以一為負隅開平方除之演段圖翻法圖演段曰本積只有長之闊一正少長自之一段所以用為負隅減去從方以應積數草曰置積為實以六十步為從方置一算為負隅於實上商置長三十步命負隅減從三十以上商命餘從合除積九百而積不及乃命翻法於商數之下積數之上置合除積九百反減元積八百六十四餘正積三十六以上商命負隅減從三十盡負隅二退又上商長六步
