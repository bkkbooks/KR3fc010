body:
  text: 三十八折半減九三十九三歸減三三十一人分七千一百三十貫問人得幾何答曰二百三十貫三十一為法用四因錢數於身內減二四台問解曰四因三十一為百二十四減二四四十一三因減二三四十二三歸減四四十三三因減二九四十四兩折減一四十五倍位九歸四十六兩折又減一五四十七四因訖減八八四十八兩折減二四十九兩次七歸絹一千三百單二尺每匹四十二尺問計幾匹答曰三十一匹四十二為法置總尺數三歸減四合問又曰置總尺數六歸七歸同五十一三歸減七五十二兩折減三五十三二因隔位減六五十四加五兩次九五十五二因減一五十六二因減乙二五十七三歸減九五十八二因減一六五十九二因減乙八吉布四千九百六十八尺每匹五十四尺問計幾匹答曰九十二匹五十四為法置尺數用六歸九歸合問
