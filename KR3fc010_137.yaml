body:
  text: 答曰八斗二升三合八勺總餘二斗七升四合六勺術曰三因以代三煩為除於元實退四位為不盡零數草曰置米數二千七百四十六石為實退四位先命為除不盡零數二斗七升四合六勺三因元米合問定位如除人上得斗吉布二十五匹稅一今有二千七百四十六匹匹法四十八尺問稅幾匹答曰一百九匹四十尺三寸二分術曰四因以代二十五除也草曰置布數二千七百四十六匹四因得一百九匹餘八分四釐遇零分以六因又八因為尺為寸合問錢二千七百四十六貫買田每畝二十貫問𠔏買幾畝答曰一百三十七畝七十二步術曰五因以代二除也草曰置總錢二千七百四十六貫於百貫上定得畝數五因得一百三十七畝餘三分遇零分三因又八因為步數合問支錢二千七百四十六貫買綾每一丈價值一貫六百六十六文問合買若干答曰一千六百四十七丈六尺總餘一貫九十八文四分術曰六因以代一六六六除也
