body:
  text: 錢塘楊輝史仲榮編集夫算者題從法取法將題問凡欲見明一法必設一題若問題須詳取用大槪不出乘除後人用加減歸折乃乘除之曲徑也若猝然承題未見取法之隙用乘除爲便或日用定數當立折變爲捷是皆得其宜也卻不必勉强自取周折今以一至三百爲題驗諸加減具載後云加因代乘三百題一至九本法從因隨題用法求捷不拘執一爲法一十百千同不求祇定位二爲法倍之三四六各用因五爲法折半進圓田徑七十六步問周圍幾步荅曰二百二十八步以徑求周用三爲法草曰置徑七十六步先因七云三七二十一改二百一十又因六云三六一十八將六步改十八七八九各用損見一損三存七見一損二存八見一損一存九卽此陰乘之義直田長九十步闊七十步問積步荅曰六千三百步七爲法置九十步尾上損三云三九退二十七九爲法置七十步尾上損一云一七退七合問
