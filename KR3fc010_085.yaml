body:
  text: 宋楊輝集五曹刊誤三題五曹云方田正中有桑斜至隅一百四十七步問田幾何合計一百八十畝一十八步五曹法誤荅一百八十三畝一百八十步五曹術以二乘桑至隅步乃取田之全斜也以五乘七除卽方五斜七之義所以誤荅前數然不可用方五斜七之法方五斜七僅可施於尺寸之間其可用於百畝之外本法當二乘隅爲方田之弦步自乘折半開平方除之取田方一而之數以方自乘卽得所荅或謂開方直分子之煩莫若竟用半偶一百四十七步自乘倍之爲積母乃捷徑也草曰一百四十七步自乘得二萬一千六百九步倍之得四萬三千二百一十八步以畝法二百四十除得一百八十畝一十八步五曹曰牆田方圍一千步問田幾何卽是方田荅曰二百六十畝一百步田形旣方不當曰牆田只當直云方田若干爲題其術稱以四除一千步得二百五十步自乘爲積畝法除之
