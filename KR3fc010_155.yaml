body:
  text: 實首位存身得數減零言十當身減言如次身減之定位如除元納頭子錢一十九貫一百五十二文問本税錢若干元放稅錢每貫扣頭子錢五十六文荅曰三百四十二貫草曰置元稅錢數兩折半作四貫七百六十八文於十文上定貫減四合問滅二位術曰以所有物數爲實爲身以所求物價一後二位零實首位存身得數先減第二位言十次身減積言如隔位退如卻減第一位言如次身減積言十就實除之定位如除米九十七石三斗一升每人給三斗七升問給幾人荅曰二百六十三人三斗七升爲法若依求一用二三須折半反繁矣草曰三因積數三因米數爲二百九十一石九斗三升於石上定得人身外減一乙合問重減術曰除題位煩者約之作兩次減或三次減位簡必捷不妨本法定位支錢四百四十一貫三百二十文給一百八十七人問各
