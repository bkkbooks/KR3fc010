body:
  text: 乘左上左下乘右上各併之上得二百四十下得一十八人不合所問以出率相減為法十二匹減十四匹餘二匹以法二匹除之賊是九人絹百二十合問又術併盈不足為實多十二少六匹𠔏十八匹以出率多少相減餘為法十二減十四餘二匹以法除實得人數二除一十八得九人以所率乘人數十四乘九人得百二十六十二乘九人得百零八減盈一十二匹增不足六匹合問方圓論圓三徑一方五斜七算家之常談未易概論也九章圓田周三十步積七十五步李淳風注徑一十步若劉𡽪術以五十乘周如一百五十七而一徑九步一百五十七分步之八十七密率云七乘周如二十二而一徑九步十一分步之六三率較之孰多今以課分術求同分母劉𡽪術合徑九步一千七百二十七分步之九百五十七密率合徑九步一千七百二十七分步之九百四十二此術有周自可求徑或有徑亦可反術求周𡽪術求積令圓周自乘又二十五乘之三百十四而一
