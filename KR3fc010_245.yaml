body:
  text: 勾五股五各自乘併而為五十開平方求弦得七尺多餘積一尺張丘建算經問圓材徑二尺一寸得方面幾何答曰一尺五寸李淳風注開方除之為一尺四寸二十五分寸之二十一術云五乘徑寸以七除之即方五斜七之義李淳風之注有寸下二十五分寸之二十一亦方五斜七之義徑即弦也勾股術曰徑二尺一寸自乘半之為二尺二寸五釐開平方除之得勾面一尺四寸二百八十一分寸之二百四十五用辨古通源開方不盡法則方五斜七非其法也九章欲將方積為圓用十二乘周開平方除之如圖積求方用周自乘十二而一平方除之並取圓三方四徑一之義矧如𡽪密二率各有分子於開方有礙黃帝九章素無開方尚餘分子之法雖辨古通源有之或欲還源須用添入一段積數終不及乘除分子還源端正古人既用圓三徑一之率如開方不盡之法亦可並行不廢𡽪密二術為方為圓四曰三除長二十四步以乘闊得一千一百五十二身外加二五得一千四百四十百步上定畝五曰三除闊一十六步以乘長得一千一百五十二身外加二五得一千四百四十百步上定畝
