body:
  text: 九百六十八步五曹算法有鼓田兩頭各廣四十步中廣五十二步從八十五步問為田合計三千九百一十步法誤作三千七百四十步應用算法有三廣田一頭廣二十八步一頭廣四十步中闊十八步正長百四十步問田多少答曰十五畝四十步以上三題一體是作兩段梯田取用今立小問圖證免後人之惑也今有腰鼓田兩頭各廣八步中廣四步正從一十二步問田幾何答曰七十二步腰鼓田乃梯田二段上闊相頂應用算法倍中闊作八步併兩闊一十六步𠔏二十四步以正從乘得二百八十八步以四除之鼓田兩頭各廣四步中廣八步正從十二步問田幾何答曰七十二步鼓田乃梯田二段下闊相抵五曹算法乃併三廣以正從乘而三除誤矣草曰倍中闊作十六步併兩廣八步𠔏二十四步以正從十二步乘之得二百八十八步以四除之
  hash: sha256:bdad3424a12155e54ea2c4f139a05f76b2a8dd9ec545472e56044e4649992cd2
