body:
  text: 下乘加減言如對身脫對又三角𣐟底層四箇脫四箇四隅𣐟底層六箇中加半中加半六箇半半並誤丰每人給米五斗答曰答誤若錢二千七百四十六貫買田五因以代二除也二誤三支錢二千七百四十六貫買綾一千六百四十七丈六尺丈誤文文因以代一六六六除也六因誤四因貫上定得丈丈誤文錢二千七百四十六貫買銀總餘一十三文七分三釐十三誤十二細物一十二斤半得二百一十九斤六分八釐脫六身前因謂自十一至十九謂自誤自謂二百三十二斤每斤三十一文云二三身前下如六闕前下如六銀二十四兩七錢脫脫誤以實上四因下三位法四誤曰損乘是反用九歸之術定下當有闕文商除二法其一實不闕一字言十過法身闕言十其二實下闕三字言如對法身闕如對以價為法求物數者闕求隨法尾所拂處闕指處出錢七百二十九貫以求率為法求誤永乘除通變算寶卷中
