body:
  text: 本經今有望海島立二表人從前表卻行脫前表取望島峰與表末參合表末誤前表宜云島峰謂山之頂上脫峰立兩表齊謂立表木令端直闕立脫齊木誤末令誤之以人目於木末望島闕以人目木誤本為前表之始闕始於木末相望木誤本二去表相減為相多脫去減誤去表高乘之為實乘誤垂闕之臣淳風等謹案謹案誤以假如竿不知高除之得三十尺脫得有竿不知其高去人立遠四十尺闕有竿不知其高去人用窺穴望表與竿齊平人目窺穴高四尺闕表與竿齊平人目九章以表望山術曰全闕乘表去竿遠四十尺得二百四十尺闕尺得二百四十尺加表一丈闕加凡股中容橫句中容直闕凡股中容橫句中圖闕右上角意闕不補是木之高脫脫楊輝算法札記
