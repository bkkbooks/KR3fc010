body:
  text: 答曰三十六步術曰一之積為實𠔏步為從方八為負隅平方除之演段曰求長不得見差用闊數乘積以長為隅算上問如前題得八長一闊用一之積八為負隅也草曰置積八百六十四步為實置三百一十二步為從方以人為負隅實上商置長三十步命負隅八減從二百四十餘從七十二命上商除實其積不及合除二千一百六十之數故用翻積置負積二千一百六十以元積八百六十四減之尚餘正積一千二百九十六復以上商命負隅減從二百四十而從亦不及止有七十二又用翻置負從二百四十以減七十二餘負從一百六十八而隅從積算皆負矣從一退隅二退位又上商長六步命隅八得四十八并從𠔏二百一十六命上商除實得長合問方田圓田各一段𠔏積二千二百六十八步只云方田面與圓田徑相等問各幾何答曰三十六步術曰四因積步為實七為隅算開平方除之演段曰四因田積有四箇方田四箇圓田而四圓田恰
