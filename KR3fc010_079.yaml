body:
  text: 環田中周即梯田之上廣環田外周即梯田之下廣環田徑步即梯田之長步環田本法併中外周而半之以徑乘之梯田之法併上下廣折半以長乘之可通用也草曰併中外周得二十六步以徑四步乘得一百四十四步折半合問方箭外圍三十二隻問𠔏箭幾隻答曰八十一隻草曰內圍八隻併外圍三十二𠔏四十雙折半以四層乘之合問以八除外圍即得四層圓箭外圍三十隻問𠔏箭幾隻答曰九十一隻草曰內圍六隻併外圍三十𠔏三十六隻折半以五層乘之合問以六除外圍求得五層今有圭垜一堆上一束底闊八束梯垜草二堆小堆上
