body:
  text: 術曰二因積步以闊差乘之元長除之得數減大頭自乘餘積開平方除之為截闊加大頭闊折半為法除田積為長草曰二因積步得三千五百七十五以二闊相減餘差十八步乘得六萬四千三百五十步用元長九十步除得七百十五步以大頭闊三十八自乘得一千四百四十四減積餘七百二十九步開平方除之得截闊二十七步併大頭闊三十八步折半得三十二步半除截積一千七百八十七步半得長五十五步合問梯田長一百二十步北闊十二步南闊十八步計積一千八百步今自截長北頭一半問截闊田積幾何答曰截闊一十五步田積八百一十步術曰置南北闊差步以元長除之截長乘之又併北闊為所截闊步別併二闊折半以截長乘之為田積步草曰置二闊以少減多餘差六步以元長一百二十除為五釐用半長六十乘得三步併北闊共十五步為所截之闊又併二闊共二十七步折半得十三步半以乘截長六十步得田積八百一十步環田外周七十二步中周二十四步實徑八步今自外周截積二百八十五步問所截內周及實徑幾步答曰截徑五步中周四十二步術曰二因積步以二周相減差步乘之元徑除之別置
