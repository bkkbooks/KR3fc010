body:
  text: 若謂六歸算繁尺上加五改用兩次九歸同六十一二因減二二六十二二因減二四六十三二因減二六六十四兩次加二五六十五二因減三六十六加五減乙九歸六十七二因減三四六十八兩折減七六十九二因減三八六十四人分銀一百四十七兩二錢問各幾何答曰二兩三錢六十四為法置銀數兩次加二五以代兩次八歸又曰減六兩折半同七十一二因減四二七十二加二五九歸七十三二因減四六七十四加五減一乙七十五加二九歸七十六兩折減九七十七七歸減一七十八減三六歸七十九二因減五八米二百二十石四斗各支七斗六升問給幾人答曰二百九十人七斗六升若依求一倍位愈繁今置米數用兩次折半身內減九合問八十一兩次九歸八十二二因減六四八十三二因減六六八十四加五減四九歸八十五二因減七八十六加五減二九八十七二因減七四八十八八歸減一
