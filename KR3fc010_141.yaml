body:
  text: 六勺術曰九因以代繁一除也草曰置粟數二千七百四十六石如商除人上定得石九因得二石四斗七升一合四勺副置元粟退四位為除不盡餘數得二斗七升四合六勺合問重因術曰法數如九九合數者則用重因得六十三用七因九因如四十八用六因八因定位如乘絹二百七十四匹每匹四十八尺問共幾尺答曰一萬三千一百五十二尺草曰置絹數二百七十四匹於匹上定得尺六因又八因之金二百七十四兩每兩二十四銖問共幾銖答曰六千五百七十六銖草曰置兩數二百七十四於兩上定銖三因又八因之田二百四十步為畝亦用此術但移定位身前因謂自十一至十九可於十後加零而十即一也何二十一至九十一不可於身前用因乎術曰置實數為身以一前之數於身前如因法求之言如身前步位言十身前二位下起定位如乘二百三十二斤每斤三十一文問錢幾何答曰七貫一百九十二文草曰置斤數為身斤上定文於身前三因之
