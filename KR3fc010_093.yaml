body:
  text: 商闊置積方法從方隅算命上商除實六百四十訖二因方法一退名商第二位數圖廉從法亦一退隅算二退又商置闊四步乘隅於廉後置四名隅以廉從隅三法皆命上商四除實憲得闊二十四步商闊置積方法從方隅算比類給銀八百六十四兩只云所得銀之兩數比總分人數其銀多十二兩問總是幾人每人各得幾兩荅曰二十四兩三十六人銀多爲長人少爲闊銀多十二卽長闊之差數也取用同前帶從開平方除之直田積八百六十四步只云闊少長十二步問長步幾何荅曰三十六步益積開方術曰置積爲實以不及十二步爲負隅開平方除之得長草曰置積八百六十四於第二級置差十二步於第四級爲負後置負隅一算於第五級於第一級上商置長三十步以乘負隅於第三級置方法三十以上商三十
