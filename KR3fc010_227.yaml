body:
  text: 除實得四加先得緑橘共十枚之數以溫柑緑橘共十六枚減都數一百餘八十四即匾橘之數醇酒每斗七貫行酒每斗三貫醨酒三斗直一貫今支一十貫買酒十斗問各幾何答曰醇酒六升價四貫二百文行酒一斗價三貫文醨酒八斗四升價二貫八百文本無三分身之術張丘建算經辨古通源祗有細草輝偶見寫本有此題問亦無成術宜云三價中以一價除出一位所得之數其餘二物共價如雙分身法求之題有分子者通之草曰置十貫酒十斗先以行酒一斗三貫除出一斗餘錢七貫即醇醨酒九斗共價也如雙分身術求之內醨酒三斗直一貫合通分以共價七貫三因作二十一醇酒一斗直七貫亦用三因醨酒三斗直一貫以醨酒一貫乘九斗減共錢餘一十二貫為實以醇醨二價相減餘二十貫為法除實得醇酒六升反減九斗共數得醨酒八斗四升以各價乘之合問互換謂入新粟出舊粟九章名粟米金立方一寸謂長闊高皆是十分再自乘得一千分重一斤即十六兩今有金立方七分謂長闊高皆是七分再自乘得三百四十三分問重幾何答曰五兩四錢八分八釐
