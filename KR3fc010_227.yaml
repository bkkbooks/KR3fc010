body:
  text: 除實得四加先得綠橘𠔏十枚之數以溫柑綠橘𠔏十六枚減都數一百餘八十四卽匾橘之數醇酒每㪷七貫行酒每㪷三貫醨酒三㪷直一貫今支一十貫買酒十㪷問各幾何荅曰醇酒六升價四貫二百文行酒一㪷價三貫文醨酒八㪷四升價二貫八百文本無三分身之術張𠀉建算經辯古通源祗有細草輝偶見寫本有此題問亦無成術宜云三價中以一價除出一位所得之數其餘二物𠔏價如雙分身法求之題有分子者通之草曰置十貫酒十㪷先以行酒一斗三貫除出一㪷餘錢七貫卽醇醨酒九㪷𠔏價也如雙分身術求之內醨酒三㪷直一貫合通分以𠔏價七貫三因作二十一醇酒一㪷直七貫亦用三因醨酒三㪷直一貫以醨酒一貫乘九㪷減𠔏錢餘一十二貫爲實以醇醨二價相減餘二十貫爲法除實得醇酒六升反減九㪷𠔏數得醨酒八㪷四升以各價乘之合問互換謂入新粟出舊粟九章名粟米金立方一寸謂長闊高皆是十分再自乘得一千分重一斤卽十六兩今有金立方七分謂長闊高皆是七分再自乘得三百四十三分問重幾何荅曰五兩四錢八分八釐
