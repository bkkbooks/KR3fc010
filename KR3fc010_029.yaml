body:
  text: 一百三十二人分酒三十四石三斗二升二誤三百四一百四七七歸三歸七歸上七歸誤八歸百六一減一減五五誤三管銀三千七百九十兩荅曰二百三十四斤四誤五四百二十貫於貫下闕一字羅四百九十一丈用折半八歸代八誤六二百一二百三減四五減五八闕五八二百六折半隔位減三闕三二二二誤一二二二二七上二誤一米六百二石一斗遇八九二成十闕二成二三一二誤一二三四減三減八減三誤減二二三五六因減四一闕減四一二三八減四減七闕減七六百七十五貫七百𠔏得二百九十疋得誤荅二四一二四五五誤三二四六減二三折半減二誤減四二六三四因隔一位退五二闕下二二八三三歸隔位還一七遇二八三成千脫遇續古拉奇算法羅七尺羅尺價三十六文文誤丈𠔏積分身術𠔏誤先求綾價術價誤羅雞翁一直五文買雞百隻雞誤母問翁母雛各幾何翁下衍得各以雞雛三因之闕之得十一爲雞母數闕一
