body:
  text: 七十五乘四里便得所荅之數假如田方二里四十步如何取用解曰方二里四十步明是長六百四十步闊六百四十步若用長闊步數相乘以畝法爲除必繁豈不知東西六百四十步自成二畝三分之二四百八十步是二畝一百六十步是一畝三停之中二停便當以三分因二畝爲六分併之二以八分爲法乘南面六百四十得五千一百二十分以元乘三分除得一千七百六畝三分畝之二三分畝之二卽是一百六十步同問比類方箭外圍四十隻問𠔏箭若干荅曰一百二十一隻法添八以乘外圍十六而一添心箭借方田法外圍兩折半增一爲方面自乘之又借用梯田法併內外圍折半以層數乘之外圍以八除之層數圓田六法隨題取用周步問積者用周自乘十二而一或用半周自乘三而一徑步問積者徑自乘三之四而一或用半徑自乘三之周徑問積者周徑相乘四而一
