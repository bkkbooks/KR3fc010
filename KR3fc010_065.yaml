body:
  text: 草曰半闊三步併角長十六得一十九步以闊乘之得一百一十四步合問今有環田中周九十二步外周一百二十二步徑五步問田幾何九章答曰二畝五十五步草曰併中外周得二百一十四步半之得一百七步以徑五步乘得五百三十五步以畝法除得答數術曰併中外周而半之以徑乘之又法併中外周以半徑乘之又法併中外以徑乘而半之又法中周外周各自乘以少減多餘為實十二而一外周之數可以信筆出題惟徑步不可得而擅立須以內周減外周餘六而一為徑環田積徑不可不審題云中周六十二步四分步之三外周一百一十三步二分步之一合徑八步二十四分步之十一誤刊作徑十二步一分之二其田積合得七百四十五步一百九十二分步之七十五誤刊作一千一百一十六步四分步之一求徑草曰分母四通六十二步併分子三得二百五十一又倍外周分母作四通步併分子二得四百五十四以少減多餘二百三以二十四除得八步二十四分步
  hash: sha256:99a51ce9cb2cca2f09654b5f9bcb689d053d9e818d3f23ff8a336b929500ccb9
