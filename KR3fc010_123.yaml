body:
  text: 錢田積七十二步只云內方六步問外周幾步答曰三十六步術曰內方自乘併積以十二乘之為實開平方除得外周演段曰內方自乘併積變圓田一段以十二乘者變周自乘一段開平方除出周步草曰內方乘得三十六步併於七十二又十二乘得一千二百九十六開平方除得外周合問錢田積七十二步只云通徑十二步問內方幾步答曰六步術曰四因積步以通徑自乘三之減積餘為實四為隅算開平方除得內方演段曰徑自乘三之四而一為圓田若減本積則知內方之實古人謂法拙以通徑自乘三之不用四除卻以四因積步以少減多餘即四段內方用四為隅開平方即是內方草曰通徑十二自乘三之得四百三十二以四因積步二百八十八減之餘一百四十四為實用四為正隅開平方除出內方六步合問田畝比類乘除捷法卷下
