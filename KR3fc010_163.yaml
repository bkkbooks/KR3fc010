body:
  text: 不用求一草曰置出錢數一千三百五十貫九百於實貫上定兩三歸爲四百五十兩三錢減九合問米一百五十四石三斗八升每人支米六斗二升問給幾人荅曰二百四十九人求一草曰倍法倍每人六斗二升爲一二四倍實倍總米作三百八石七斗六升存身減二四合問粟一百五十六石八斗七升每人支六斗三升問給幾人荅曰二百四十九人不用求一草曰九歸粟又七歸之合問五千七百一十二步問得幾畝荅曰二百三十八畝求一草曰半法畝法二百四十半作一百二十半實總步折半爲二千八百五十六減二合問每畝收粟二石七斗今𠔏收粟六百四十二石六斗問元田若干荅曰二百三十八畝不用求一草曰九歸粟數又三歸合問又草曰置粟數減五又減八合問絹一萬三千一百五十二赤問爲絹幾匹匹法四十八赤荅曰二百七十四匹求一草曰兩折匹法作一十二赤兩折絹數作二千二
