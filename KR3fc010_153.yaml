body:
  text: 答曰一千一百三十四貫二百文草曰置一百七畝畝上定得十貫隔位加六又草置一十貫六百百上定得十貫隔位加七加二十三與二十九合數中所無者故立此術法曰如加二位之法先加零數而後入身數定位如加銅二十九匜每匜二十三斤問重幾何答曰六百六十七斤草曰置銅數為身二十九匜於匜上定十斤先加三後入身又置二十三斤為身斤上定十斤先加九後入身減法四術一曰減一位二曰減二位三曰重減四曰減隔位減一位術曰以出錢數為實以所求題一後零數為法從
