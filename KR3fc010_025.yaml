body:
  text: 法算取用本末卷下夫算者問題上闕一字圓田徑七十六步先因七云三七二十一闕三七二十直田長九十步闊七十步脫闊而上闕一字下闕一字二十一至二十九倍位加一一誤二一定百退七十七闕七十七物二十一兩置二百七十闕置二二百七十為法二誤一闕法物二百三十六斤又命三十貫三誤二三十一至一百三因加三闕三綢六十二匹每匹四丈丈誤文又損三同三誤一五十一六因九因闕因三因加九闕九綢五十七匹每匹五丈一尺闕綢丈誤文置尺數三因闕尺數三因六十一四因加七闕七七一陌省錢退位用七因合問闕七因足稱一百二十六斤置斤數三折半闕三又九因合問闕九案足稱展省用一百二十五為法是足稱一斤當省稱一斤四兩然則省稱一斤當足稱一十二兩八錢也百四一百四八加二加乙乙用九歸乙乙誤二百六一百六三加六三闕六三百六五加一加五一
