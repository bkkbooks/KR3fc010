body:
  text: 併矢四步共十三步為圓田徑步錢田積七十二步只云面徑三步問內方幾步答曰六步術曰四因積步以面徑自乘又十二乘之用減積餘為實十二乘面徑為從方一為益隅開平方除之得內方之數演段曰四因錢田變井田三段負內方三段有面徑方積十二段又面徑乘內方十二段比錢田又負內方一段所以用一為益隅開平方演段圖草曰四因積步以面徑三步自乘得九又十二乘為減積餘一百八十步為實以十二乘面徑三步得三十六為從方一為益隅上商六益積三十六共積二百一十六命從方除實盡得內方六步合問
