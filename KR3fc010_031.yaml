body:
  text: 錢一百緑橘一枚三文脫一餘二百分為實二誤三醇酒每斗七貫買酒十斗十誤七以共價七貫三因作二十一三誤二二乘四除九乘四除互換互誤五二乘五除七乘五除加四四誤因兵士三千四百七十四人母相乘為實實誤法題數無零者而三法不下闕一字三人均一百當以五為衰當誤嘗以九十五乘列衰闕以今有四人分錢丁又誤丁丁並脫問賊人分所盜絹少七匹多六匹匹並誤足上並得八十四為匹八十四誤四十八假如賊人盜絹各分一十二匹闕各十二乘九人得百零八全脫假如自方五尺句五股五各自乘闕五張丘建算經問圓材以七除之七誤寸九章欲將方積為亦可並行不廢闕廢四曰三除長案與上文不相蒙當有闕文直田長七百二十尺二誤一田方七十二步以題數立法者闕法三分得二十一畝闕得海島題解魏劉徽注九章注誤汪
