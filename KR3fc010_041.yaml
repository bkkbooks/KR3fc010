body:
  text: 是書誤文頗少而闕文脫文甚多續古摘奇算法句股之下直田之前竟脫去一葉其餘板口上方多闕一角葢原書由散葉排比而成破損在所不免影鈔者依樣謄寫故也今據算術逐條校算可補者補之疑者闕之以俟君子道光庚子中元後兩日江陰宋景昌識
