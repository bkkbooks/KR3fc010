body:
  text: 前問用匠四十八工每工支米三升六合問共若干答曰一石七斗二升八合草曰以三升六合乘四十八工於工上定合合前問或用兩度六因匠數亦同假如前題直田廣三十六步縱四十八步或不用乘除祇以二因三十六步便得七畝二分解曰田長四十八步用闊五步除為一畝今以二因三十六步即是以二因代五除闊也又術三因四十八步折半亦得七畝二分解曰田闊三十六步居一畝二百四十步中二十停之三故用三因折半直田步下帶尺者術曰廣縱步皆通為尺相乘如畝法六千尺除之一步長五準尺其不及畝積尺以二十五除之為尺為寸為分直田廣二十四步三盡縱三十六步二尺問田幾何答曰三畝一百七十五步四分四釐草曰以五尺通廣步縱步并零八尺廣得一百二十三縱得一百八十二相乘得二萬二千三百八十六尺以畝法六千尺除得三畝餘四千三百八十六尺用四因代二十五除為步
  hash: sha256:72e1d21c367bf6e9a18d069a95b4ec1399a25fbbb16f518cfa0cc1bf3c9368c7
