body:
  text: 草曰置總錢二千七百四十六貫如商除貫上定得丈六因得一千六百四十七丈六尺副置元錢退四位貫上定分四因為除不盡零數一貫九十八文四分或零錢盈尺價者再用本法六因併之命零合問錢二千七百四十六貫買銀每兩一十四貫二百八十五文問共買得幾何答曰一百九十二兩二錢二分總餘一十二文七分三釐術曰七因以代一四二八五除也草曰置總錢二千七百四十六貫如商除定位十貫上定兩七因得一百九十二兩二錢二分副置元實折半五退為不盡零錢元實折半五退得一十三文七分三釐合問細物一十二斤半稅一今有二千七百四十六斤問稅幾何答曰二百一十九斤一十兩八錢八分術曰八因以代一二五除也草曰置斤數二千七百四十六斤於百斤上定稅兩八因得二百一十九斤六分八釐斤外零分加六為兩於六分八釐上加六得一十兩八錢八分合問粟二千七百四十六石給一千一百一十一人問各幾何答曰二石四斗七升一合四勺總餘二斗七升四合
