body:
  text: 草曰勾闊十一步股長二十二步四分四釐九毫九絲半用勾股相乘折半得積一百二十三步四分七釐四毫七絲二忽半又置梯田南闊二十二步四分四釐九毫九絲半併北闊十五步以半長十七步乘之得積六百三十六步六分四釐九毫一絲五忽併二積𠔏七百六十步一分二釐三毫八絲七忽半以畝法除得三畝四十步零步以一步之積二十五乘之得三尺九分六釐八毫七絲半直田長四十八步闊四十步計積八畝今欲依原長四十八步截賣三畝問闊幾何答曰闊十五步商除術曰置截積七百二十步以元長四十八除之得闊合問互換術曰置闊四十步以所截三畝乘之以元田八畝除之亦得十五步尢捷直田長四十八步闊四十步計積八畝今欲依元闊四十步截田三畝問長多少答曰一十八步互換術曰置田四十八步以所截三畝乘之元田八畝除之得一十八步合問中山劉先生序謂算之術入則諸門出則直田議古根源故立演段百問蓋欲演算之片段也知片段則能窮根源
