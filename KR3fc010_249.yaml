body:
  text: 三曰三除長六百八寸乘半闊六百十六寸於十萬寸上定畝田方七十二步問計幾畝答曰二十一畝六分本法方自乘如畝法二百四十而一求畝術曰方步折半自乘以六除之十步上定畝又曰方步兩折一十八步自乘十五除之十步定畝以題數立法者名曰數段以二十四步為畝下一分上題方七十二步即是畝下三分以七十二步乘之即是七十二箇三分得二十一畝六分之數圭田長九十六步闊三十二步問田幾畝答曰六畝四分本術曰長闊相乘折半畝法除之求畝術曰長步九十六加二五得百二十以乘半闊一十六步二而一十步定畝竿不知長量影得一丈五尺別立一表長一尺五寸其影得五寸問竿長幾何答曰四丈五尺孫子術曰以表長一尺五寸乘影一丈五尺以表影五寸除之事貴再三長短二影恐不實須更別立一竿驗之方定假如更立一丈二尺竿得影長四尺方是取的言之當用以表望山之術今卷後立望竿二題引證海
