body:
  text: 元金為長每兩換絹若干為闊其所換總絹匹數即直田之積步也直田積八百六十四步只云闊不及長十二步問長闊𠔏幾步答曰六十步術曰四因積步以差步自乘併而開平方除之得長闊𠔏步草曰四因積步有四長四闊是𠔏三千四百五十六步又補入差自乘一百四十四步𠔏三千六百開平方得一面六十步合問比類金八百六十四兩只云鋌數少如兩數十二問銀數兩數𠔏若干答曰鋌與兩數𠔏六十兩數為長鋌為闊圖意法草同前直田積八百六十四步只云長闊𠔏六十步欲先求闊步得幾何答曰二十四步益隅術曰置積為實𠔏步為從方以一為益隅開平方除之演段曰一積止有一長若以長闊𠔏步為從方正少一闊所以用一為益隅益入一段闊方以應從方除數
