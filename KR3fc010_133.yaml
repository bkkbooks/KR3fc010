body:
  text: 上乘身前因及商除物求價並法尾之數定實下乘加減損并商除價求物並法首之數定實九歸法首是千實上定百法首是百實上定十相乘六法一曰單因二曰重因三曰身前因四曰相乘五曰重乘六曰損乘單因法曰置衆位為實陰記單位為法從上位因起言十過身言如就身改之定位如乘議曰因法不獨能乘而亦能除定位如除以單因引用新術解錢九貫文月利一分八釐在庫十一箇月零十七日問息錢若干答曰一貫八百七十三文八分術曰三因月數皆通為日而併零日日上定分以所解錢數九因又日利六因為息解一貫月利十八文日得六分故用六因草曰置十一箇月以三因併零日共三百四十七以所解錢數九貫因之又日利六分因之合問三角垜底面七箇問積幾何日用有圖答曰八十四箇
