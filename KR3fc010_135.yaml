body:
  text: 術曰置底面數張三位本位不加中加一下加二於內取一位可以六除者六除訖以三位相乘爲積草曰置底層七箇張三位一闊一長一高本位七箇不加中加一八箇下加二九箇內取九箇可用六除爲一箇半以七因之又八因之合問又三角垜底層四箇問積幾何荅曰二十箇草曰置底層四箇副置中位加一五箇副置下位加二六箇遇六數不用直以五四相因得積不用六因亦免六除合問四隅垜底層六箇問積幾何荅曰九十一箇術曰置底層數張三位上不加中加半下加一內取一位可三除者除訖三位相乘爲積草曰置底層六箇張三位一闊一長一高上不加中加半六箇半下加一七箇內上位六箇三除爲二以因六箇半又七因之合問以六爲二免三除也每人給米五斗𠔏支二百四十六石問給幾人荅曰四百九十二人草曰置米數二百四十六石石上定人二因爲人數三千三百三十三人𠔏支米二千七百四十六石問各幾何
