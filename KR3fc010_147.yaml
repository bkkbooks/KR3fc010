body:
  text: 九言十過法身言如對法身除之定位以價為法求物數者以法首之數定實以物數為法求價者隨法尾所指處定為所得出錢七百二十九貫買物每兩二貫四百三十文問物幾兩答曰三百兩其一術草曰置出率為實七百二十九貫以求率為法二貫四百三十法首與實首相頂置位定兩十兩以法首之數定實法首是貫於貫上定得兩約至百貫上定百兩上商置三百兩以法除之適盡合問出錢二貫四百三十文買物七千二百九十枚問買幾何答曰二錢買三枚其二術草曰置物數為實七千二百九十易錢數為法二貫四百三十法首與實首相頂置位隨法尾所指處為所得法尾是十文上指實十枚即知一文得一枚也上商三即得三枚以法除之適盡合問算法通變本末卷上
  hash: sha256:8486aa18b0e1203c7353ce87c2395adb8c8a7c7de12e6376ef2746d16c12c901
