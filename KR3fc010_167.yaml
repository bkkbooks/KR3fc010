body:
  text: 術曰置足斛為實為身常以求身為伯用八十三歸從實上位求起言十次身言如退位布之括曰見一下十七見二下三十四見三下五十一見四下六十八見四一五作五退八十三成百四一五為中後四句不用亦可見五下一百二見六下百十九見七下百三十六見八下百五十一田積二千九百六十七步元長六十九步問元闊步答曰四十三步六十九歸括曰見一下三十一見二下六十二見三下百二十四遇三四五作五遇六十九作一百見四下一百五十五見五下二百十七見六下二百四十八算無定法詳説因九九錯綜而有合數陰陽凡八十一句今人求簡止念
