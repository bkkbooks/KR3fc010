body:
  text: 合問二百九十七爲法置斤價加一損一得一千九百四十貫四百又三因合問二百一至三百用雜法前問已鋪設取用此後一同兹不必再述二百一加三四加五二百二隔位加一倍之二百三七因兩折加一六二百四加二加七二百五折半身前四因二百六倍之隔位加三二百七加三八加五二百八加三加六二百九加一加九二乙一連身加一乙二乙二倍之隔位加六二乙三加四二加五二乙四倍之隔位加七二乙五加七二三折半二乙六加二加八二乙七七因兩折加二四二乙八倍之隔位加九二乙九加四六加五二二乙加三加七二二二倍之加一一二二三連身加二三二二四加四加六二二五兩次加五二二六二因加一三二二七連身加二七二二八加二加九二二九連身加二九二三乙加一加四加五二三二倍之加一六二三三連身加三三二三四加三加八二三五加八八三次折二三六倍之加一八
