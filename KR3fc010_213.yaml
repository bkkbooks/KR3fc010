body:
  text: 百七一九歸減九百七二減七二百七三減七三百七四減七四百七五四因七歸百七六減一減六百七七減七七百七八減七八百七九減七九四百二十貫買物每斤百七十五文問得幾斤答曰二千四百斤百七五為法置四百二十貫依歸法退一位於貫上定斤四因總錢用七歸求之百八乙減八乙百八二減三減四百八三減八三百八四減八四百八五六因減一乙百八六減八六百八七減乙減七百八八減八八百八九九歸三歸七歸粟四百四十七石九斗三升各支一石八斗九升問給幾人答曰二百三十七人一石八斗九升為法置粟數於十石上定人用三歸又七歸九歸求之合問一百九一至百九九本法減二位恐繁今總術置積數從上逐位折半是一隔位還零遇本數起而成百謂如百九乙為法以二百折半得一隔位還九又如百九九以積折半隔位還一偶遇本數百九十一或百九九則不必求便起為一即是九歸之義也百九乙減九乙百九二減二減六百九三減九三
