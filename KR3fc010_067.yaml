body:
  text: 之十一比類方箭圓箭方箭外圍四十隻問共幾隻答曰一百二十一隻內圍八隻即是中周外圍四十即是外周併之得四十八乘五層折半加增心箭合問以八除外圍而知五層也圓箭外圍三十六隻問共幾隻答曰一百二十七隻本法外周加六以乘外周十二而一增心箭借梯田法以內圍六隻併外圍三十六共四十二以六層乘之得二百五十二折半加心箭合問以六除外圍即知層數圭田三法廣步可以折半者用半廣以乘正從從步可以折半者用半從步以乘廣廣從步皆不可折半者用廣從相乘折半圭田廣十二步從十二步問田幾何答曰七十二步廣從相乘折半圖
