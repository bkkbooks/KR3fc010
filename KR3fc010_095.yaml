body:
  text: 乘負從十二添積三百六十卻除積九百餘積三百二十四步二因方法共六十改名廉法一退負從一退負隅二退又於實上商置長六步以乘負隅一置六於廉次名隅以上商六命負從添積七十二共積三百九十六以廉隅之數命上商除實適盡得三十六步合問減從開方術曰置積為實以不及十二步為從減方法開平方除之草曰依五級資次布置商積方法負從隅算置積為實於實上商置長三十以乘隅算置三十於實數之下名曰方法以負從十二減三十餘一十八命上商除實五百四十餘積三百二十四復以上商三十乘隅得三十併入方法共四十八退位為廉其隅算再退又於實上商長六步以乘隅算得六併入廉法共五十四命上商六步除實盡得長三十六步合問比類以金換絹八百六十四匹不知黃金一兩元換絹幾匹但云元金總兩與每兩所換匹數較之則兩多如匹十二今先問元金幾兩答曰三十六兩
