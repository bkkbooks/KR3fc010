body:
  text: 宋楊輝楊輝字謙光錢塘人著算法六卷其目曰田鴨比類乘除捷法上曰田畝比類乘除捷法下曰算法通變本末曰乘除通變算寶曰法算取用本末曰貫古摘奇算法其田畝比類乘除捷法自序曰為田畝算法者蓋萬物之體變段終歸於田勢諸題用術變折皆歸於乘除中山劉先生作議古根源序曰入則諸門出則直田蓋此義也撰成直田演段百問信知田體變化無窮引用帶從開方正負損益之法前古之所未聞也作術愈遠罔䆒本源非𢲘𦣱索隱而莫能知之輝擇可作關鍵題問者重為詳悉著述推廣劉君垂訓之意五曹算法題術有未切當者僭為刪改以便後學君子目之曰田畝比類乘除捷法庶少裨汲引之梯徑云爾時德祐改元歲在乙亥也楊輝算法論曰輝所著書載於文淵閣書目訪之三十年通人學士士俱未之見嘉慶庚午余以翰林學士充文穎館提調官於永樂大典中鈔得楊輝摘奇及等約百餘番嗣漕督淮安屬吾友江上舍鄭堂蕃排比整齊之然掇拾殘賸之餘䆒非全秩也頃聞蘇州黃蕘圃主事丕烈得宋刊楊輝算法亟屬何君夢華元鍚假録其副流覽一過知輝於此學未云深造田畝比類重修議古截田諸問皆
