body:
  text: 體一曰開平方二曰開平圓三曰開立方四曰開立圓五曰開分子方六曰開三乘以上方七曰帶從開方竝載少廣勾股二章作一日學一法用兩月演習題目須討論用法之源庶久而無失㤀矣九章二百四十六問固是不出乘除開方三術但下法布置尢宜編厯如互乘五段維乘列衰方程竝列圖于卷首九章二百四十六問除習過乘除諸分開方自餘方田粟米只須一日下徧衰分功在立衰少廣全類合分商功皆是折變均輸取用衰分互乘每一章作三日演習盈不足方程勾股用法頗雜每一章作四日演習更將九章纂類消詳庶知用算門例九章之義盡矣事物紀原載勾股㫄要本是兩章今總爲一章詳觀法意實是兩端劉𡽪以㫄要之術變重差減積爲海島九問劉益以勾股之術治演段鎖方譔議古根源二百問帶益隅開方實冠前古九章序云或得一二以能自成一家之書信矣但海島題法隱奧莫得其祕李淳風雖注祗云下法亦不曾説其源議古根源元無細草但依術演算亦不知其旨自九章勾股而有二書因二書增續諸家之妙序又云九章猶儒者之六經醫家之難素兵法之孫子歟是故勉學者知九章矣乘除加減用法
