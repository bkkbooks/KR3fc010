body:
  text: 米四百八十六石二斗各支一石四斗三升問給幾人答曰三百四十人一石四斗三升為法置米數先減一又減三又曰置米數減四三兩位同田積六萬六千二百四十步問計幾畝答曰二百七十六畝一畝二百四十步為法置田積步折半減二又曰置積步先減五再減六若謂減五滅六算繁用六因九歸以代減五折半加二五以代減六若或祗說減法安知之妙故以減代除又以歸加代減庶知題法不妄斡旋有理二十一至一百隨題用法二十一減五減四二十二折半減一二十三折半更減一五二十四折半減二二十五四因二十六折半減三二十七三歸九歸二十八折半減四二十九四因減一六六百八十貫買布每匹二貫五百問得幾匹答曰二百七十二匹匹價二貫五百即是十貫買四匹置錢數四因合問三十一四因減二四三十二兩折加二五三十三三歸減乙三十四折半減七三十五二因七歸三十六兩折九歸三十七三因減乙乙
