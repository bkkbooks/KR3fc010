body:
  text: 二積一千四百四十步以六十步除得闊二十四步草曰置積八百六十四步爲實別置一算爲益隅從尾末位約實至百下定十上商闊二十積下置方法二十以上商命方法得四百盆積卻以從方六十除積一千二百餘六十四二因方法一退爲廉後方亦一退益隅二退又上商闊四步次廉之下亦置隅四以上商乘廉隅益積實𠔏二百四十上商命從法除實盡得闊二十四步合問減從術曰置積爲實𠔏步爲從方以一爲負隅開平方除之減從法圖演段曰若不益積便用減從或有不可益積者須用減從開之草曰置積八百六十四爲實以六十步爲從方以一算爲負隅上商置闊二十以乘負隅減從方二十以上商
