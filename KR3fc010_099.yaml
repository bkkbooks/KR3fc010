body:
  text: 二積一千四百四十步以六十步除得闊二十四步草曰置積八百六十四步為實別置一算為益隅從尾末位約實至百下定十上商闊二十積下置方法二十以上商命方法得四百盆積卻以從方六十除積一千二百餘六十四二因方法一退為廉後方亦一退益隅二退又上商闊四步次廉之下亦置隅四以上商乘廉隅益積實共二百四十上商命從法除實盡得闊二十四步合問減從術曰置積為實共步為從方以一為負隅開平方除之減從法圖演段曰若不益積便用減從或有不可益積者須用減從開之草曰置積八百六十四為實以六十步為從方以一算為負隅上商置闊二十以乘負隅減從方二十以上商
  hash: sha256:0daf5c5e9d9cd55ffc278729c67082c3d5cd6e423a2ae00e51be48e16a1744ed
