body:
  text: 草曰置價錢為法二十三貫一百二十一文約之先以九約又以七約乃見三百六十七更不可約也以約餘之數三百六十七乘斤數三萬八千三百六十七斤得一萬四千八十貫六百八十九文卻以兀約七九之數作六十三文乘之損乘即下乘也上乘以生數下乘即損數術曰九乘者損一十去其一即九八乘者損二十去其二即八七乘者損三十去其三即七六乘者損四五乘者折半折半即是損五四乘者損六三乘者損七二乘者損八並自末位求起即下乘也是反用九歸之術定官文錢二萬六千四百一十貫每貫除頭子錢伍拾陸文問共得若干答曰一百四十七貫八百九十六文草曰五十六本是七因八因今易為損法當先用損三以代七因置二萬六千四百一十貫於十貫上定百後末位損三得一百八十四貫八百七十又用損二以代八因而得答數商除二法定位二法其一實法步術曰置出率為實以求率為法以法商實命九九合數言十過法身言如對法身除之詳解算法有注其二實術曰易法為實易實為法以法商實命九
