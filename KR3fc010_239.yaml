body:
  text: 法除之合問有木不知長引繩度之繩多四尺五寸再以半繩量之繩少一尺問木長幾何答曰六尺五寸術曰倍少數倍一尺為二尺併多數得木長合問一量有餘四尺五寸乃一木長外餘數也再以半繩量缺一尺乃二木中各缺一尺也倍缺數併多數為法者乃是作二木取用陰去一木之長也盈不足孫子算經賊人盜絹題目不云九章本法而以羅紋相乘上下相併為答蓋其數差一偶同也若差數二三則上下相併不可用矣問賊人分所盜絹人各七匹總少七匹人各六匹總剩六匹問賊與絹各幾何孫子答曰賊一十三人絹八十四匹術草曰置盈不足之數右七匹少七匹左六匹多六匹維乘右下乘左上得四十二左下乘右上亦四十二各併之上併得八十四為匹下併得十三為人數合問假如賊人盜絹各分一十二匹總多一十二匹各分一十四匹總少六匹問賊人與絹各幾何答曰賊是九人絹百二十匹九章術曰置盈不足右十二匹多十二匹左十四匹少六匹維乘右下
