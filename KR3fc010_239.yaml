body:
  text: 法除之合問有木不知長引繩度之繩多四尺五寸再以半繩量之繩少一尺問木長幾何荅曰六尺五寸術曰倍少數倍一尺爲二尺併多數得木長合問一量有餘四尺五寸乃一木長外餘數也再以半繩量欠一尺乃二木中各欠一尺也倍欠數併多數爲法者乃是作二木取用陰去一木之長也盈不足孫子算經賊人盜絹題目不云九章本法而以羅紋相乘上下相併爲荅蓋其數差一偶同也若差數二三則上下相併不可用矣問賊人分所盜絹人各七疋總少七疋人各六疋總剩六疋問賊與絹各幾何孫子荅曰賊一十三人絹八十四疋術草曰置盈不足之數右七疋少七疋左六疋多六疋維乘右下乘左上得四十二左下乘右上亦四十二各併之上併得八十四爲疋下併得十三爲人數合問假如賊人盜絹各分一十二疋總多一十二疋各分一十四疋總少六疋問賊人與絹各幾何荅曰賊是九人絹百二十疋九章術曰置盈不足右十二疋多十二疋左十四疋少六疋維乘右下
